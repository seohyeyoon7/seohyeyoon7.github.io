<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOAS KPI 경영 대시보드</title>
<style>
:root{
  --brand:#F78F1E; --brand-soft:#FFF3E6; --brand-line:#F6DCB9; --brand-ink:#9a5a07;
  --green:#7AC141; --green-soft:#EEF7E5;
  --ok:#5FA52E; --ok-soft:#EAF6E0;
  --warn:#E6B400; --warn-ink:#9a7a00; --warn-soft:#FBF3D6;
  --danger:#D93025; --danger-soft:#FBE7E5;
  --bg:#F6F7F9; --card:#FFFFFF; --border:#E6E8EC; --muted:#6B7280; --text:#2B2F36;
  /* 사이드바: 밝은 톤 + 주황 액센트 */
  --sb:#FFFFFF; --sb-soft:#FFF6EC; --sb-line:#ECEEF1; --sb-mut:#8A909A;
  --radius:12px;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--text);font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic","Segoe UI",sans-serif;font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;font-variant-numeric:tabular-nums}
h1,h2,h3,h4{margin:0;font-weight:700;letter-spacing:-.3px}
.muted{color:var(--muted)} .tiny{font-size:11.5px}
button{font-family:inherit;cursor:pointer}
svg.ic{display:block}

.app{display:flex;min-height:100vh}

/* ---- Sidebar (light) ---- */
.sidebar{width:248px;flex-shrink:0;background:var(--sb);border-right:1px solid var(--sb-line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;transition:margin-left .22s ease}
.app.sbhide .sidebar{margin-left:-249px}
.sb-logo{display:flex;align-items:center;gap:11px;padding:18px 18px 16px;cursor:pointer;border-bottom:1px solid var(--sb-line)}
.sb-logo .mark{width:34px;height:34px;border-radius:9px;background:var(--brand);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px;flex-shrink:0}
.sb-logo b{font-size:15px;display:block;letter-spacing:-.2px;color:var(--text)}
.sb-logo span{font-size:11px;color:var(--sb-mut)}
.sb-nav{flex:1;overflow-y:auto;padding:8px 10px 10px}
.sb-grp{font-size:10px;font-weight:700;letter-spacing:.4px;color:var(--sb-mut);text-transform:uppercase;padding:14px 8px 6px}
.sb-item{display:flex;align-items:center;gap:10px;width:100%;padding:8px 10px;border:none;background:none;color:#4a505a;border-radius:8px;font-size:13px;text-align:left;margin-bottom:2px;transition:.12s}
.sb-item:hover{background:var(--sb-soft);color:var(--brand-ink)}
.sb-item.active{background:var(--brand);color:#fff;font-weight:600}
.sb-item .ic{flex-shrink:0} .sb-item .lbl{flex:1}
.sb-item .dotsig{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sb-foot{padding:12px 14px;border-top:1px solid var(--sb-line)}
.sb-demo{font-size:10.5px;color:var(--brand-ink);background:var(--brand-soft);border:1px dashed var(--brand-line);border-radius:7px;padding:7px 9px;line-height:1.4}

/* ---- Main ---- */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:14px;padding:18px 30px 16px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20}
.burger{width:38px;height:38px;border-radius:9px;border:1px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;color:var(--text);flex-shrink:0}
.burger:hover{border-color:var(--brand);color:var(--brand)}
.topbar .ttl{cursor:pointer}
.topbar .ttl h1{font-size:25px;line-height:1.15}
.topbar .ttl .sub{font-size:13px;color:var(--brand-ink);margin-top:4px;font-weight:600}
.topbar .sp{flex:1}
.topbar .meta{font-size:11.5px;color:var(--muted);text-align:right;line-height:1.6}
.topbar .meta b{color:var(--text)}
.content{padding:22px 30px 70px;max-width:1180px}

.sec{display:flex;align-items:baseline;gap:10px;margin:26px 2px 14px}
.sec:first-child{margin-top:4px}
.sec .bar{width:4px;height:18px;background:var(--brand);border-radius:2px;align-self:center}
.sec h2{font-size:16px}
.sec .s{font-size:12px;color:var(--muted);font-weight:400}

/* signal */
.sig{display:inline-flex;align-items:center;gap:6px;font-weight:700;white-space:nowrap;font-size:12px}
.sig .dot{width:9px;height:9px;border-radius:50%}
.sig.ok{color:var(--ok)} .sig.ok .dot{background:var(--ok)}
.sig.warn{color:var(--warn-ink)} .sig.warn .dot{background:var(--warn)}
.sig.risk{color:var(--danger)} .sig.risk .dot{background:var(--danger)}
.sig.none{color:var(--muted)} .sig.none .dot{background:#c2c6cc}
.sig.pill{padding:3px 11px;border-radius:999px}
.sig.pill.ok{background:var(--ok-soft)} .sig.pill.warn{background:var(--warn-soft)}
.sig.pill.risk{background:var(--danger-soft)} .sig.pill.none{background:#eef0f2}

.estbadge{font-size:10px;font-weight:700;color:var(--brand-ink);background:var(--brand-soft);border:1px dashed var(--brand-line);border-radius:5px;padding:1px 6px}
.realbadge{font-size:10px;font-weight:700;color:#3a6e16;background:var(--green-soft);border:1px solid #cfe6b6;border-radius:5px;padding:1px 6px}
.tagb{font-size:10px;font-weight:800;border-radius:5px;padding:1px 6px}
.tagb.core{color:#8a3a00;background:#FFE9D2;border:1px solid #f3cfa6}
.tagb.spec{color:#5a4a00;background:#FBF0C8;border:1px solid #ecdf9c}
.tagb.bon{color:#2c6e63;background:#dff3ee;border:1px solid #b6e0d6}

/* exec */
.exec{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.kc{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;flex-direction:column;gap:4px}
.kc .hd{display:flex;align-items:center;justify-content:space-between;gap:8px}
.kc .hd .lab{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted)}
.kc .hd .ico{width:30px;height:30px;border-radius:8px;background:var(--brand-soft);color:var(--brand);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.kc .val{font-size:27px;font-weight:800;letter-spacing:-.6px;margin-top:4px}
.kc .val small{font-size:13px;font-weight:600;color:var(--muted)}
.kc .meta{font-size:11.5px;color:var(--muted)}
.dn{color:var(--danger);font-weight:700} .up{color:var(--ok);font-weight:700}
.cmp .rowc{display:flex;align-items:center;gap:8px;font-size:11.5px;margin-top:7px}
.cmp .rowc .lb{width:48px;color:var(--muted);flex-shrink:0}
.cmp .rowc .me{font-weight:800;width:54px;text-align:right}
.cmp .rowc .bars{flex:1;display:flex;gap:3px;align-items:flex-end;height:26px}
.cmp .rowc .bars .b{flex:1;border-radius:3px 3px 0 0;min-height:3px}

/* compact demand + claim row */
.row2{display:grid;grid-template-columns:1.25fr 1fr;gap:14px;align-items:start}
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.panel .ph{padding:11px 14px;border-bottom:1px solid var(--border);font-size:12.5px;font-weight:700;display:flex;align-items:center;gap:8px}
.panel .ph .ico{color:var(--brand)}
table.dt{border-collapse:collapse;width:100%;font-size:12px}
.dt th,.dt td{padding:6px 12px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}
.dt th{font-size:10.5px;color:var(--muted);font-weight:700;background:#fafbfc}
.dt td.n,.dt th.n{text-align:right}
.dt tr:last-child td{border-bottom:none}
.dt tr.sum td{font-weight:800;background:#fafbfc}
.minib{display:inline-flex;gap:2px;align-items:flex-end;height:18px;vertical-align:middle}
.minib i{width:4px;background:var(--brand);border-radius:2px 2px 0 0;display:inline-block;min-height:2px}
.claimwrap{padding:12px 14px}
.claim-legend{display:flex;gap:14px;font-size:11px;color:var(--muted);margin-top:4px}
.claim-legend .k{display:inline-flex;align-items:center;gap:5px}
.claim-legend .sw{width:11px;height:11px;border-radius:3px;display:inline-block}
.claim-tot{display:flex;gap:18px;padding:10px 14px;border-top:1px solid var(--border);background:#fafbfc}
.claim-tot .b .l{font-size:10.5px;color:var(--muted)} .claim-tot .b .v{font-size:17px;font-weight:800}

/* divisions */
.divs{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.dcard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;flex-direction:column;gap:11px;cursor:pointer;transition:.12s}
.dcard:hover{border-color:var(--brand);transform:translateY(-1px);box-shadow:0 6px 18px rgba(20,20,30,.05)}
.dcard.lead{border-color:var(--brand);border-width:1.5px}
.dcard .top{display:flex;align-items:center;gap:10px}
.dcard .top .dico{width:36px;height:36px;border-radius:9px;background:var(--brand-soft);color:var(--brand);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dcard .top .nm{font-size:14.5px;font-weight:700;flex:1}
.dcard .rev{font-size:12px;color:var(--muted)} .dcard .rev b{color:var(--text);font-weight:700}
.dcard .loss{font-size:12px;color:var(--muted)} .dcard .loss b{font-size:17px;display:block;font-weight:800}
.dcard .loss b.neg{color:var(--danger)} .dcard .loss b.pos{color:var(--ok)} .dcard .loss b.zero{color:var(--muted)}
.dcard .rk .h{font-size:11px;color:var(--muted);margin-bottom:4px}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;background:#f3f4f6;color:var(--text);border:1px solid var(--border);border-radius:6px;padding:2px 7px;margin:2px 4px 2px 0}
.chip .tg{font-size:9px;font-weight:800;padding:0 4px;border-radius:3px}
.chip .tg.core{color:#8a3a00;background:#FFE0C2}
.chip .tg.spec{color:#5a4a00;background:#F4E7B0}
.dcard .go{margin-top:2px;align-self:flex-start;font-size:12px;font-weight:700;color:var(--brand-ink);background:var(--brand-soft);border:1px solid var(--brand-line);border-radius:8px;padding:6px 12px}

/* loss top3 */
.lpan{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;gap:20px;flex-wrap:wrap}
.lpan .sum{flex:0 0 200px;background:var(--danger-soft);border-radius:10px;padding:14px}
.lpan .sum .l{font-size:12px;color:#8a3024} .lpan .sum .v{font-size:25px;font-weight:800;color:var(--danger)}
.lpan .sum .n{display:inline-block;margin-top:6px}
.lpan .lst{flex:1;min-width:240px}
.lpan .row{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--border)}
.lpan .row:last-child{border:none}
.rank{width:22px;height:22px;border-radius:6px;background:var(--danger);color:#fff;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lpan .nm{flex:1;font-size:13px} .lpan .nm small{display:block;color:var(--muted);font-size:11px}
.lpan .amt{font-weight:800;color:var(--danger)}

/* division detail */
.ddtop{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.ddtop .crumb{display:flex;align-items:center;gap:8px;font-size:13px}
.ddtop .crumb a{color:var(--brand);font-weight:700;cursor:pointer}
.ddtop .crumb .sepc{color:var(--muted)}
.ddtop .sp{flex:1}
.ddsel{font-size:12.5px;font-weight:600;color:var(--text);background:var(--card);border:1px solid var(--border);border-radius:8px;padding:7px 11px}
.ddsel:focus{outline:none;border-color:var(--brand)}
.ddhead{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;display:flex;gap:28px;flex-wrap:wrap;align-items:center}
.ddhead .blk .l{font-size:11.5px;color:var(--muted)} .ddhead .blk .v{font-size:22px;font-weight:800;margin-top:2px}
.ddhead .blk .v.neg{color:var(--danger)} .ddhead .blk .v.pos{color:var(--ok)} .ddhead .blk .v.zero{color:var(--muted)}
.ddhead .rk{flex:1;min-width:200px} .ddhead .rk .l{font-size:11.5px;color:var(--muted);margin-bottom:5px}

/* tasks (rolled back flow, equal cards) */
.tasks{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.task{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:14px 16px;border-left:3px solid var(--brand);display:flex;flex-direction:column}
.task .ttl{font-weight:700;font-size:14px;margin-bottom:11px;display:flex;align-items:center;gap:8px}
.flow{display:flex;flex-direction:column;flex:1}
.flow .step{display:flex;gap:10px;align-items:flex-start;padding:3px 0}
.flow .tag{flex:0 0 42px;font-size:10.5px;font-weight:700;color:var(--muted);text-align:right;padding-top:2px}
.flow .arrow{color:var(--brand);margin:-1px 0 -1px 51px;font-size:11px}
.flow .txt{flex:1;font-size:12.5px}
.flow .txt.act{font-weight:700;color:var(--brand-ink);background:var(--brand-soft);border-radius:6px;padding:2px 8px}
.flow .owner{display:inline-block;font-size:11.5px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:1px 8px}

/* team kpi blocks (compact grid) */
.teamgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.team{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:12px 14px}
.team .th{margin-bottom:6px}
.team .th .nm{font-size:13px;font-weight:700}
.tk{display:flex;align-items:baseline;gap:6px;padding:4px 0;border-top:1px solid var(--border);font-size:12px;flex-wrap:wrap}
.tk:first-of-type{border-top:none}
.tk .knm{font-weight:600}
.tk .kt{color:var(--muted);font-size:11.5px}
.bonus{margin-top:12px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 15px;font-size:12.5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.bonus b{font-weight:700}

/* related kpi */
.grp{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.gbtn{font-size:12.5px;font-weight:600;color:var(--text);background:var(--card);border:1px solid var(--border);border-radius:999px;padding:6px 15px;cursor:pointer}
.gbtn.active{background:var(--brand);border-color:var(--brand);color:#fff}
.krow{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px 15px;margin-bottom:10px;display:grid;grid-template-columns:1.5fr 1.3fr auto;gap:14px;align-items:center}
.krow .nm{font-weight:700;font-size:13.5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.krow .df{font-size:11px;color:var(--muted)}
.krow .edit{display:flex;gap:12px}
.krow .f{display:flex;flex-direction:column;gap:2px}
.krow .f label{font-size:10px;color:var(--muted)}
.krow .ig{display:flex;align-items:center;gap:3px}
.krow input{width:62px;padding:5px 7px;border:1px solid var(--border);border-radius:7px;font:inherit;font-size:12.5px;text-align:right}
.krow input.tgt{border-style:dashed}
.krow .u{font-size:11px;color:var(--muted)}
.krow .right{text-align:right;min-width:148px}
.krow .imp{font-size:11.5px;color:var(--muted);margin-top:5px} .krow .imp b{color:var(--danger)}
.gauge{margin-top:8px}
.gauge .bar{position:relative;height:9px;background:#EEF0F2;border-radius:6px}
.gauge .fill{position:absolute;left:0;top:0;bottom:0;border-radius:6px}
.gauge .tgt{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--text)}
.gauge .tgt::after{content:"목표";position:absolute;top:-15px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--muted);white-space:nowrap}
.gauge .lb{display:flex;justify-content:space-between;font-size:10.5px;color:var(--muted);margin-top:9px} .gauge .lb b{color:var(--text)}
.gline{font-size:12px;color:var(--muted)}

/* cascade one-sentence */
.cassent{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:15px 17px;font-size:13.5px;line-height:1.75}
.cassent b{color:var(--text)}
.cassent .act{font-weight:700;color:var(--brand-ink);background:var(--brand-soft);border-radius:6px;padding:2px 8px}
.cassent .step{color:var(--muted);font-weight:700;font-size:11px;margin-right:4px}

/* layer2 */
.l2warn{background:var(--danger-soft);border:1px solid #f0bcb6;border-radius:10px;padding:13px 16px;margin-bottom:16px;display:flex;gap:9px;align-items:center;flex-wrap:wrap;font-size:12.5px;color:#8a3024}
.l2warn b{color:var(--danger)} .l2warn .c{background:#fff;border:1px solid #f0bcb6;color:#8a3024;border-radius:999px;padding:2px 10px;font-size:11px;font-weight:700}
table.t2{border-collapse:collapse;width:100%;font-size:12.5px;background:var(--card);border-radius:var(--radius);overflow:hidden}
.t2 th,.t2 td{padding:10px 12px;border-bottom:1px solid var(--border);text-align:left}
.t2 th{background:#fafbfc;font-size:11.5px;color:#444;font-weight:700}
.t2 td.n,.t2 th.n{text-align:right}
.neg{color:var(--danger);font-weight:700} .pos{color:var(--ok);font-weight:700}
.gatec{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:12px}
.gatec .bx{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px}
.gatec .bx .l{font-size:11.5px;color:var(--muted)} .gatec .bx .v{font-size:20px;font-weight:800;margin-top:4px}
.gatec input{width:90px;padding:5px 7px;border:1px solid var(--border);border-radius:7px;font:inherit;text-align:right}

.hidden{display:none!important}
footer{font-size:11px;color:#9aa0a6;text-align:center;padding-top:22px}
@media (max-width:1000px){
  .sidebar{position:fixed;z-index:40;box-shadow:0 0 30px rgba(0,0,0,.12)}
  .exec{grid-template-columns:repeat(2,1fr)} .divs{grid-template-columns:1fr}
  .row2{grid-template-columns:1fr} .tasks{grid-template-columns:1fr}
  .krow{grid-template-columns:1fr;gap:10px} .krow .right{text-align:left}
  .content{padding:18px}
}
</style>
</head>
<body>
<div class="app" id="app">
  <aside class="sidebar">
    <div class="sb-logo" id="logoHome"><div class="mark">K</div><div><b>KOAS KPI</b><span>경영 대시보드</span></div></div>
    <nav class="sb-nav" id="sbNav"></nav>
    <div class="sb-foot"><div class="sb-demo">검증용 임시 빌드 · 일부 숫자 비확정<br>실제=시트값 · 임의=가정값</div></div>
  </aside>
  <div class="main">
    <div class="topbar">
      <button class="burger" id="burger" title="사이드바 열기/닫기">
        <svg class="ic" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>
      <div class="ttl" id="titleHome"><h1>KOAS KPI 경영 대시보드</h1><div class="sub">전사 목표는 현장의 실행으로 완성됩니다.</div></div>
      <div class="sp"></div>
      <div class="meta">기준월 <b id="bm"></b> · 단위 <b>억 원</b><br>갱신일 <span id="upd"></span></div>
    </div>
    <div class="content">
      <div id="view-corp"></div>
      <div id="view-div" class="hidden"></div>
      <div id="view-l2" class="hidden"></div>
      <footer>검증용 단일 HTML · 외부 라이브러리 없음 · 실제값=시트 / 임의값=가정 · 인쇄 가능</footer>
    </div>
  </div>
</div>
<script>
/* ===== ICONS (제조업 맥락) ===== */
function ic(p,sz){sz=sz||18;return `<svg class="ic" width="${sz}" height="${sz}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;}
const ICON={
  home:'<path d="M3 11l9-8 9 8M5 10v10h14V10"/>',
  profit:'<path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/>',
  revenue:'<path d="M12 1v22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>',

/* ===== CALC ===== */
const CONVERTIBLE=["가능","부분"];
function baseValue(k){if(!k.base)return null;if(k.base==="fundRate")return PARAMS.fundScale*PARAMS.fundRate;return PARAMS[k.base];}
function impact(k){if(!CONVERTIBLE.includes(k.money))return null;const b=baseValue(k);if(b==null||k.target==null||k.actual==null)return null;const sign=(k.st==="higher")?1:-1;return (k.actual-k.target)*b*sign;}
function signal(k){if(k.target==null||k.actual==null)return "none";
  if(k.st==="higher"){if(k.actual>=k.target)return "ok";if(k.actual>=k.target*0.85)return "warn";return "risk";}
  if(k.st==="lower"){if(k.actual<=k.target)return "ok";if(k.actual<=k.target*1.1)return "warn";return "risk";}
  if(k.actual<=k.target)return "ok";if(k.actual<=k.target+1)return "warn";return "risk";}
const SIGW={risk:3,warn:2,ok:1,none:0},SIGLAB={ok:"정상",warn:"주의",risk:"위험",none:"미입력"};
function fmtA(v,d){if(v==null)return "–";d=d==null?1:d;return (v<0?"−":"")+Math.abs(v).toFixed(d)+"억";}
function dispVal(k,v){if(v==null)return "";return k.unit==="%"?(v*100).toFixed(v<0.1?2:1):v;}
function parseVal(k,raw){if(raw===""||raw==null)return null;const n=parseFloat(raw);if(isNaN(n))return null;return k.unit==="%"?n/100:n;}
function fmtDisp(k,v){if(v==null)return "–";if(k.unit==="%")return (v*100).toFixed(v<0.1?2:1)+"%";return v.toLocaleString()+(k.unit==="배"?"배":k.unit);}
function divStats(id){const ks=KPIS.filter(k=>k.div===id);let worst="ok";
  ks.forEach(k=>{const s=signal(k);if(SIGW[s]>SIGW[worst]&&s!=="none")worst=s;});
  if(ks.every(k=>signal(k)==="none"))worst="none";
  const net=ks.map(impact).filter(v=>v!=null).reduce((a,b)=>a+b,0);
  return {worst,net};}
function sigInline(s){return `<span class="sig ${s}"><span class="dot"></span>${SIGLAB[s]}</span>`;}
function sigPill(s){return `<span class="sig pill ${s}"><span class="dot"></span>${SIGLAB[s]}</span>`;}
/* 추정손익 라벨: +이익 / -손실 / 0 균형 */
function netLabel(v){if(v<-0.001)return {lab:"추정손실",cls:"neg"};if(v>0.001)return {lab:"추정이익",cls:"pos"};return {lab:"추정손익 균형",cls:"zero"};}
function tagBadge(t){if(t==="핵심")return '<span class="tagb core">핵심</span>';if(t==="특임")return '<span class="tagb spec">특임</span>';if(t==="실행")return '<span class="tagb" style="color:#9a5a07;background:#FFF3E6;border:1px solid #f6dcb9">실행</span>';if(t==="성과금")return '<span class="tagb bon">성과금</span>';return '';}
function tagChip(t){if(t==="핵심")return '<span class="tg core">핵심</span>';if(t==="특임")return '<span class="tg spec">특임</span>';return '';}

/* claim combo chart (안깨지게 헤드룸 확보) */
function claimChart(){
  const W=460,H=190,pl=30,pr=30,pt=22,pb=24,iw=W-pl-pr,ih=H-pt-pb;
  const m=CLAIM.month,cnt=CLAIM.count,cost=CLAIM.cost;
  const maxC=Math.max(...cnt.filter(v=>v!=null),1)*1.15,maxK=Math.max(...cost.filter(v=>v!=null),0.1)*1.28;
  const bw=Math.min(iw/m.length*0.46,30);
  let svg=`<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" style="display:block;max-height:200px">`;
  for(let g=0;g<=2;g++){const y=pt+ih*g/2;svg+=`<line x1="${pl}" y1="${y.toFixed(1)}" x2="${W-pr}" y2="${y.toFixed(1)}" stroke="#eef0f2"/>`;}
  // bars + 건수 라벨(막대 안쪽 흰색)
  m.forEach((mm,i)=>{const cx=pl+iw*(i+0.5)/m.length;
    if(cnt[i]!=null){const bh=cnt[i]/maxC*ih;const top=pt+ih-bh;
      svg+=`<rect x="${(cx-bw/2).toFixed(1)}" y="${top.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="3" fill="#F78F1E"/>`;
      const ly=bh>22?top+14:top-5, lc=bh>22?"#ffffff":"#9a5a07";
      svg+=`<text x="${cx.toFixed(1)}" y="${ly.toFixed(1)}" font-size="10" font-weight="700" fill="${lc}" text-anchor="middle">${cnt[i]}</text>`;}
    svg+=`<text x="${cx.toFixed(1)}" y="${H-7}" font-size="10" fill="#6B7280" text-anchor="middle">${mm}</text>`;});
  // 비용 선 + 라벨(점 위쪽, 차트 안쪽)
  let pts=[],lbl="";
  m.forEach((mm,i)=>{if(cost[i]!=null){const cx=pl+iw*(i+0.5)/m.length;const cy=pt+ih-(cost[i]/maxK*ih);pts.push([cx,cy]);
    const ly=Math.max(cy-9,pt+9);
    lbl+=`<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="3.5" fill="#D93025"/><text x="${cx.toFixed(1)}" y="${ly.toFixed(1)}" font-size="10" font-weight="700" fill="#D93025" text-anchor="middle">${cost[i].toFixed(2)}</text>`;}});
  if(pts.length>1)svg+=`<polyline points="${pts.map(p=>p[0].toFixed(1)+","+p[1].toFixed(1)).join(" ")}" fill="none" stroke="#D93025" stroke-width="2.2"/>`;
  return svg+lbl+`</svg>`;
}

  const ratio=k.st==="higher"?(k.target?k.actual/k.target:0):(k.actual?k.target/k.actual:1);
  const max=1.3,fillPct=Math.max(0,Math.min(ratio,max))/max*100,tgtPct=(1/max)*100;

    <div class="lb"><span>현재 <b>${fmtDisp(k,k.actual)}</b> · 달성률 ${(ratio*100).toFixed(0)}%</span><span>${gapTxt}</span></div></div>`;}

    ${t.kpis.map(k=>`<div class="tk">${tagBadge(k.tag)}<span class="knm">${k.name}</span><span class="kt">· ${k.disp}</span>${k.real?'<span class="realbadge">실제</span>':''}</div>`).join("")}
  </div>`).join("")}</div>
  ${(()=>{const b=BONUS[curDiv];return `<div class="bonus"><span class="tagb bon">성과금</span><b>성과금 재원</b> · ${b.v.toFixed(1)}억 ${b.real?'<span class="realbadge">실제</span>':'<span class="estbadge">임의값</span>'} <span class="tiny muted">— MAX(0,(공헌이익누계−목표)×50%)</span></div>`;})()}

  <div class="sec"><span class="bar"></span><h2>관련 KPI</h2><span class="s">— 단위가 같은 KPI만 비교</span></div>
  <div class="grp" id="grpBar"></div><div id="kpiList"></div>

  <div class="sec"><span class="bar"></span><h2>캐스케이드 맵</h2><span class="s">— 전사 → 본부 → 후행 → 선행 → 행동</span></div>
  <div class="cassent" id="cassent"></div>`;
  document.getElementById("view-div").innerHTML=h;
  document.getElementById("back1").onclick=goHome;
  document.getElementById("divSel").onchange=e=>openDiv(e.target.value);

  const ks=KPIS.filter(k=>k.div===curDiv);const avail=GROUPS.filter(g=>ks.some(k=>k.group===g));
  if(!curGroup||!avail.includes(curGroup))curGroup=avail[0]||null;
  document.getElementById("grpBar").innerHTML=avail.map(g=>{const has=ks.filter(k=>k.group===g).some(k=>{const s=signal(k);return s==="risk"||s==="warn";});
    return `<button class="gbtn ${g===curGroup?'active':''}" data-g="${g}">${g}${has?' •':''}</button>`;}).join("");
  document.querySelectorAll('[data-g]').forEach(b=>b.onclick=()=>{curGroup=b.dataset.g;renderKpiList(ks.filter(k=>k.group===curGroup));document.querySelectorAll('[data-g]').forEach(x=>x.classList.toggle('active',x.dataset.g===curGroup));});
  renderKpiList(ks.filter(k=>k.group===curGroup));

  const nd=d.node;
  document.getElementById("cassent").innerHTML=`전사 과제 <b>${nd.n}</b>은(는) <b>${d.name}</b>의 후행지표 <b>${nd.lag}</b>로 측정되고, 선행지표 <b>${nd.lead}</b>가 이를 끌어올리며, 최종적으로 <span class="act">${nd.act}</span> 행동으로 완성됩니다.`;
}
function renderKpiList(list){
  document.getElementById("kpiList").innerHTML=list.map(k=>{const s=signal(k),imp=impact(k);
    const badge=k.real?'<span class="realbadge">실제</span>':'<span class="estbadge">임의</span>';
    return `<div class="krow"><div class="info"><div class="nm">${k.name} ${sigInline(s)} ${badge}</div><div class="df">${k.def}</div>${gauge(k)}</div>
      <div class="edit"><div class="f"><label>목표</label><div class="ig"><input class="tgt" data-k="${k.id}" data-t="tgt" value="${dispVal(k,k.target)}"><span class="u">${k.unit}</span></div></div>
        <div class="f"><label>실적</label><div class="ig"><input data-k="${k.id}" data-t="act" value="${dispVal(k,k.actual)}" placeholder="–"><span class="u">${k.unit}</span></div></div></div>
      <div class="right">${sigPill(s)}<div class="imp">영향액 ${imp==null?'<span class="muted">(환산 불가)</span>':'<b>'+fmtA(imp,1)+'</b>'}<br><span class="tiny muted">누계 기준 추정</span></div></div></div>`;}).join("")||`<div class="tiny muted">해당 그룹 KPI 없음</div>`;
  document.querySelectorAll('#kpiList input').forEach(inp=>inp.oninput=e=>{const k=KPIS.find(x=>x.id===e.target.dataset.k);const v=parseVal(k,e.target.value);
    if(e.target.dataset.t==="tgt")k.target=v;else k.actual=v;renderDiv();renderSidebar('div');});
}

/* ===== LAYER2 ===== */
function renderL2(){const L=LAYER2,unit=L.totalCM/L.totalFTE;
  const rows=L.alloc.map(a=>{const al=unit*a.fte,sp=al-a.cost;
    return `<tr><td>${a.name}</td><td class="n">${a.fte}</td><td class="n">${al.toFixed(1)}</td><td class="n">${a.cost.toFixed(1)}</td><td class="n ${sp<0?'neg':'pos'}">${sp>=0?'+':'−'}${Math.abs(sp).toFixed(1)}</td><td>${sp<0?'구조 점검 필요(경영진 참고)':'비용 대비 기여 충분'}</td></tr>`;}).join("");
  const g=L.gate;
  document.getElementById("view-l2").innerHTML=`
    <div class="ddtop"><div class="crumb"><a id="back2">전사 KPI 요약</a><span class="sepc">›</span><b>비용 적정성</b></div></div>
    <div class="l2warn"><b>⚠ 비용 적정성 (Layer 2)</b><span class="c">분기용</span><span class="c">경영진 전용</span><span class="c">평가 미연동</span><span class="c">영업이익 KPI와 분리</span>
      <span style="flex:1"></span><span class="tiny">소규모 부서 구조적 불리 → 부서장 평가 직접 연동 금지</span></div>
    <div class="sec" style="margin-top:0"><span class="bar"></span><h2>FTE 배분 공헌이익</h2><span class="s">배분단가 ${unit.toFixed(2)} 억/인 = ${L.totalCM.toFixed(0)}억 ÷ ${L.totalFTE}명 <span class="estbadge">공헌이익·비용 임의</span></span></div>
    <table class="t2"><thead><tr><th>본부</th><th class="n">FTE</th><th class="n">배분 공헌이익</th><th class="n">실제 비용</th><th class="n">잉여/부족</th><th>해석</th></tr></thead><tbody>${rows}</tbody></table>
    <div class="sec"><span class="bar"></span><h2>채용 타당성 게이트</h2><span class="s">— 이 수치 없이 채용 승인 금지 <span class="estbadge">임의값</span></span></div>
    <div class="gatec">
      <div class="bx"><div class="l">신규 채용 인건비 (억)</div><div class="v"><input id="gc" type="number" step="0.05" value="${g.newLaborCost}"></div></div>
      <div class="bx"><div class="l">공헌이익률 기준 필요매출 (억)<br><span class="tiny">인건비 ÷ ${(g.cmRate*100).toFixed(0)}%</span></div><div class="v" id="gcm">${(g.newLaborCost/g.cmRate).toFixed(2)}</div></div>
      <div class="bx"><div class="l">영업이익률 기준 필요매출 (억)<br><span class="tiny">인건비 ÷ ${(g.opMarginRate*100).toFixed(1)}%</span></div><div class="v neg" id="gop">${(g.newLaborCost/g.opMarginRate).toFixed(1)}</div></div></div>`;
  document.getElementById("back2").onclick=goHome;
  document.getElementById("gc").oninput=e=>{g.newLaborCost=parseFloat(e.target.value)||0;
    document.getElementById("gcm").textContent=(g.newLaborCost/g.cmRate).toFixed(2);
    document.getElementById("gop").textContent=(g.newLaborCost/g.opMarginRate).toFixed(1);};
}

/* ===== ROUTING ===== */
function showView(v){document.getElementById("view-corp").classList.toggle("hidden",v!=="corp");
  document.getElementById("view-div").classList.toggle("hidden",v!=="div");
  document.getElementById("view-l2").classList.toggle("hidden",v!=="l2");
  if(v==="corp")renderCorp();renderSidebar(v);}
function goHome(){showView("corp");window.scrollTo(0,0);}
(function init(){
  document.getElementById("bm").textContent=META.baseMonth+"월";
  document.getElementById("upd").textContent=META.lastUpdated;
  document.getElementById("logoHome").onclick=goHome;
  document.getElementById("titleHome").onclick=goHome;
  document.getElementById("burger").onclick=()=>document.getElementById("app").classList.toggle("sbhide");
  goHome();
})();
</script>
</body>
</html>
