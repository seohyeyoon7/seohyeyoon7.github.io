<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>KOAS 경영 신호등</title>
<style>
:root{
  --emerald:#1e8e5a; --emerald-press:#19774b; --emerald-soft:#e6f4ec;
  --forest:#26473a; --forest-line:#1b332a; --lime:#9fd356;
  --navy:#234876; --navy2:#4a6794; --navy3:#6f86b0; --navy4:#cdd8e8; --navy6:#eef3f8; --navy5:#e8eff7; --navy-border:#dce5f0;
  --white:#fff; --surf2:#f3f6f4; --surf-hover:#f7faf8; --border:#e4eae6; --border-soft:#d3e7da;
  --text:#16271f; --text2:#2e3d36; --body:#52635b; --cap:#869389; --ph:#aab4ad;
  --ok:#16a34a; --ok-ink:#15803d; --ok-soft:rgba(22,163,74,.12);
  --warn:#e8a317; --warn-ink:#b45309; --warn-soft:rgba(232,163,23,.14);
  --risk:#f04452; --risk-ink:#dc2626; --risk-soft:rgba(240,68,82,.12);
  --bg:#f3f6f4; --radius:14px; --maxw:1180px;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--body);font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic","Segoe UI",sans-serif;font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;font-variant-numeric:tabular-nums}
h1,h2,h3,h4{margin:0;font-weight:700;letter-spacing:-.3px;color:var(--text)}
.muted{color:var(--cap)} .tiny{font-size:11.5px}
button{font-family:inherit;cursor:pointer}
svg.ic{display:block}
.app{display:flex;min-height:100vh}

/* Login */
.login{position:fixed;inset:0;z-index:200;background:linear-gradient(rgba(20,40,32,.90),rgba(31,58,47,.86)),radial-gradient(120% 120% at 80% 10%, #2f5848 0%, #1b332a 70%);display:flex;align-items:center;justify-content:center;padding:20px;flex-direction:column}
.login-card{width:100%;max-width:380px;background:#fff;border-radius:18px;padding:34px 30px 28px;box-shadow:0 24px 70px rgba(16,39,31,.45)}
.login-card .brand{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.login-card .brand .mark{width:40px;height:40px;border-radius:11px;background:var(--emerald);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:18px}
.login-card .brand b{font-size:18px;color:var(--text);display:block} .login-card .brand span{font-size:12px;color:var(--cap)}
.login-card .hr{height:2px;background:var(--lime);width:42px;border-radius:2px;margin:18px 0 14px}
.login-card label{display:block;font-size:12px;color:var(--body);margin:12px 0 5px;font-weight:600}
.login-card input{width:100%;padding:11px 13px;border:1px solid var(--border);border-radius:10px;font:inherit;font-size:14px;color:var(--text)}
.login-card input:focus{outline:none;border-color:var(--emerald);box-shadow:0 0 0 3px rgba(30,142,90,.14)}
.login-btn{width:100%;margin-top:20px;padding:12px;border:none;border-radius:10px;background:var(--emerald);color:#fff;font-weight:700;font-size:14.5px}
.login-btn:hover{background:var(--emerald-press)}
.login-err{color:var(--risk-ink);font-size:12px;margin-top:10px;min-height:16px}
.login-hint{font-size:11px;color:var(--cap);margin-top:14px;text-align:center}
.login-credit{margin-top:20px;font-size:11px;color:rgba(255,255,255,.62);text-align:center}
.login-credit b{color:rgba(255,255,255,.85)}

/* Sidebar (collapsible → rail) */
.sidebar{width:250px;flex-shrink:0;background:var(--forest);border-right:1px solid var(--forest-line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;transition:width .2s ease;z-index:60;overflow:hidden}
/* 접으면 아이콘만 남는 좁은 레일 */
.app.sbhide .sidebar{width:62px}
.app.sbhide .sb-logo{padding:16px 0 14px;justify-content:center}
.app.sbhide .sb-logo .nm,.app.sbhide .sb-collapse,.app.sbhide .sb-grp,.app.sbhide .sb-item .lbl,.app.sbhide .sb-item .dotsig,.app.sbhide .sb-credit{display:none}
.app.sbhide .sb-logout{font-size:0;padding:8px 0}
.app.sbhide .sb-logout::before{content:"⏻";font-size:15px}
.app.sbhide .sb-nav{padding:8px 0 10px}
.app.sbhide .sb-grp{padding:10px 0 2px;height:10px}
.app.sbhide .sb-item{justify-content:center;padding:11px 0;margin:3px 8px;position:relative}
.app.sbhide .sb-item.active{background:rgba(159,211,86,.18)}
.app.sbhide .sb-foot{padding:12px 8px}
/* 레일에서 hover 시 라벨 툴팁 */
.app.sbhide .sb-item[data-tip]:hover::after{content:attr(data-tip);position:absolute;left:54px;top:50%;transform:translateY(-50%);white-space:nowrap;background:var(--text);color:#fff;font-size:12px;font-weight:600;padding:5px 9px;border-radius:7px;z-index:90;box-shadow:0 6px 18px rgba(0,0,0,.25)}
.sb-logo{display:flex;align-items:center;gap:11px;padding:16px 14px 14px;border-bottom:1px solid var(--forest-line)}
.sb-logo .mark{width:34px;height:34px;border-radius:9px;background:var(--emerald);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px;flex-shrink:0;cursor:pointer}
.sb-logo .nm{flex:1;cursor:pointer;min-width:0} .sb-logo b{font-size:15px;display:block;color:#fff} .sb-logo span{font-size:11px;color:rgba(255,255,255,.55)}
.sb-collapse{width:30px;height:30px;border-radius:8px;border:1px solid var(--forest-line);background:transparent;color:rgba(255,255,255,.7);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-collapse:hover{background:rgba(255,255,255,.08);color:#fff}
.sb-nav{flex:1;overflow-y:auto;padding:8px 10px 10px}
.sb-grp{font-size:10px;font-weight:700;letter-spacing:.4px;color:rgba(255,255,255,.45);text-transform:uppercase;padding:14px 8px 6px}
.sb-item{display:flex;align-items:center;gap:10px;width:100%;padding:9px 10px;border:none;background:none;color:rgba(255,255,255,.78);border-radius:9px;font-size:13px;text-align:left;margin-bottom:2px;transition:.12s}
.sb-item:hover{background:rgba(255,255,255,.07);color:#fff}
.sb-item.active{background:rgba(159,211,86,.18);color:var(--lime);font-weight:700}
.sb-item .lbl{flex:1} .sb-item .dotsig{width:8px;height:8px;border-radius:50%}
.sb-foot{padding:12px 14px;border-top:1px solid var(--forest-line)}
.sb-logout{width:100%;padding:8px;border:1px solid var(--forest-line);background:transparent;color:rgba(255,255,255,.7);border-radius:8px;font-size:12px}
.sb-logout:hover{background:rgba(255,255,255,.06);color:#fff}
.sb-credit{margin-top:11px;padding-top:10px;border-top:1px solid var(--forest-line);font-size:10px;color:rgba(255,255,255,.5);text-align:center}
.sb-credit b{color:rgba(255,255,255,.72)}
.backdrop{display:none;position:fixed;inset:0;background:rgba(16,39,31,.45);z-index:50}
.backdrop.on{display:block}

/* Main */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:30}
.topbar-inner{display:flex;align-items:center;gap:13px;padding:16px 26px 14px;max-width:var(--maxw);margin:0 auto;width:100%}
.burger{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;color:var(--text);flex-shrink:0}
.burger:hover{border-color:var(--emerald);color:var(--emerald)}
.topbar .ttl{cursor:pointer;min-width:0}
.topbar .ttl h1{font-size:23px}
.topbar .ttl .sub{font-size:12.5px;color:var(--emerald-press);margin-top:3px;font-weight:600}
.topbar .sp{flex:1}
.topbar .meta{font-size:11.5px;color:var(--cap);text-align:right;line-height:1.6}
.topbar .meta b{color:var(--text2)}
.content{padding:22px 26px 70px;max-width:var(--maxw);margin:0 auto;width:100%}

.sec{display:flex;align-items:center;gap:10px;margin:30px 2px 14px}
.sec-gap{margin-top:46px}
.sec:first-child{margin-top:4px}
.sec .bar{width:4px;height:18px;background:var(--emerald);border-radius:2px}
.sec h2{font-size:16px}
.sec .s{font-size:12px;color:var(--cap);font-weight:400}

.sig{display:inline-flex;align-items:center;gap:6px;font-weight:700;white-space:nowrap;font-size:12px}
.sig .dot{width:9px;height:9px;border-radius:50%}
.sig.ok{color:var(--ok-ink)} .sig.ok .dot{background:var(--ok)}
.sig.warn{color:var(--warn-ink)} .sig.warn .dot{background:var(--warn)}
.sig.risk{color:var(--risk-ink)} .sig.risk .dot{background:var(--risk)}
.sig.none{color:var(--cap)} .sig.none .dot{background:#c2c6cc}
.sig.pill{padding:3px 11px;border-radius:999px}
.sig.pill.ok{background:var(--ok-soft)} .sig.pill.warn{background:var(--warn-soft)}
.sig.pill.risk{background:var(--risk-soft)} .sig.pill.none{background:var(--surf2)}

/* info tooltip */
.info{position:relative;display:inline-flex;vertical-align:middle}
.info .i{width:16px;height:16px;border-radius:50%;background:var(--navy5);color:var(--navy);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid var(--navy-border)}
.info .box{display:none;position:absolute;z-index:90;top:130%;left:0;width:300px;background:#fff;border:1px solid var(--border);border-radius:11px;box-shadow:0 12px 34px rgba(16,39,31,.16);padding:13px 15px;font-size:11.5px;line-height:1.6;color:var(--text2);font-weight:400;text-align:left;white-space:normal}
.info.on .box{display:block}
.info .box b{color:var(--text);font-weight:800}
.info .box .row{display:flex;justify-content:space-between;gap:10px;padding:3px 0;border-bottom:1px dashed var(--border)}
.info .box .row:last-child{border:none}

.estbadge{font-size:10px;font-weight:700;color:var(--navy2);background:var(--navy5);border:1px dashed var(--navy-border);border-radius:5px;padding:1px 6px}
.tagb{font-size:10px;font-weight:800;border-radius:5px;padding:1px 6px}
.tagb.core{color:var(--emerald-press);background:var(--emerald-soft);border:1px solid var(--border-soft)}
.tagb.spec{color:var(--warn-ink);background:var(--warn-soft);border:1px solid rgba(232,163,23,.3)}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;background:var(--surf2);color:var(--text2);border:1px solid var(--border);border-radius:6px;padding:2px 8px;margin:2px 4px 2px 0}
.chip .tg{font-size:9px;font-weight:800;padding:0 4px;border-radius:3px}
.chip .tg.core{color:var(--emerald-press);background:var(--emerald-soft)} .chip .tg.spec{color:var(--warn-ink);background:var(--warn-soft)}

/* KPI 카드 */
.kc{background:#fff;border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 1px 3px rgba(16,39,31,.04)}
.kpi-one{overflow:hidden;border-left:5px solid var(--emerald)}
.kc-main{padding:20px 22px 18px}
.kc-main .lab{display:flex;align-items:center;gap:8px;font-size:13.5px;color:var(--body);font-weight:600}
.kc-main .lab .ico{width:30px;height:30px;border-radius:9px;background:var(--emerald-soft);color:var(--emerald);display:flex;align-items:center;justify-content:center}
.kc-main-row{display:flex;gap:32px;align-items:flex-end;flex-wrap:wrap;margin-top:6px}
.kc-main-row .big{font-size:40px;font-weight:800;letter-spacing:-1px;color:var(--text);line-height:1}
.kc-main-row .big small{font-size:16px;color:var(--cap);font-weight:700}
.kc-main-stat{display:flex;gap:26px;flex-wrap:wrap;padding-bottom:3px}
.kc-main-stat .b .l{font-size:11px;color:var(--cap)} .kc-main-stat .b .v{font-size:18px;font-weight:800;margin-top:3px;color:var(--text2)}
.kc-sub{background:var(--surf2);border-top:1px solid var(--border);padding:15px 22px 16px}
.kc-sub-grid{display:grid;grid-template-columns:1fr 1fr}
.subkpi{padding:2px 20px}
.subkpi:first-child{padding-left:6px}
.subkpi.div{border-left:1px solid var(--border)}
.subkpi .t{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--body);font-weight:600}
.subkpi .v{font-size:24px;font-weight:800;letter-spacing:-.5px;margin:5px 0 7px;color:var(--text)}
.subkpi .v small{font-size:13px;font-weight:700;color:var(--cap)}
.subkpi .meta{display:flex;flex-wrap:wrap;gap:4px 14px;font-size:11.5px;color:var(--cap);align-items:center}
.subkpi .meta b{color:var(--text2);font-weight:800}
.subkpi .sx{margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);font-size:11.5px;color:var(--body)}
.subkpi .sx b{font-weight:800}
.dn{color:var(--risk-ink);font-weight:700} .up{color:var(--ok-ink);font-weight:700}

/* 신호등 현황 */
.kstat{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px}
.kstat-sub{font-size:11.5px;color:var(--cap);margin-bottom:14px}
.kstat-lights{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.klight{border:1px solid var(--border);border-radius:12px;padding:16px 10px;text-align:center;cursor:pointer;transition:.14s;background:#fff}
.klight:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(16,39,31,.07)}
.klight.sel{border-width:2px}
.klight.ok.sel{border-color:var(--ok)} .klight.warn.sel{border-color:var(--warn)} .klight.risk.sel{border-color:var(--risk)}
.bulb{width:50px;height:50px;border-radius:50%;margin:0 auto 9px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:800}
.bulb.ok{background:radial-gradient(circle at 35% 30%,#34d27a,#16a34a);box-shadow:0 0 0 5px var(--ok-soft)}
.bulb.warn{background:radial-gradient(circle at 35% 30%,#f8cd6b,#e8a317);box-shadow:0 0 0 5px var(--warn-soft)}
.bulb.risk{background:radial-gradient(circle at 35% 30%,#ff6b76,#f04452);box-shadow:0 0 0 5px var(--risk-soft)}
.klight .lab{font-size:12px;font-weight:700;color:var(--text2)} .klight .lab .cnt{font-size:11px;color:var(--cap);font-weight:600}
.kstat-list{margin-top:14px}
.kstat-list .grph{font-size:11px;font-weight:800;color:var(--cap);margin:8px 0 5px;display:flex;align-items:center;gap:6px}
.kstat-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.kstat-dot.ok{background:var(--ok)} .kstat-dot.warn{background:var(--warn)} .kstat-dot.risk{background:var(--risk)}
.kstat-tag{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;background:var(--surf2);border:1px solid var(--border);border-radius:7px;padding:4px 9px;margin:0 5px 5px 0;cursor:pointer}
.kstat-tag:hover{border-color:var(--emerald)} .kstat-tag .d{width:7px;height:7px;border-radius:50%}
.kstat-tag.ok .d{background:var(--ok)} .kstat-tag.warn .d{background:var(--warn)} .kstat-tag.risk .d{background:var(--risk)}
.kstat-tag small{color:var(--cap)}

/* 벤치마킹 분해 */
.bench{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px}
.bench .bh{display:flex;align-items:center;gap:8px;margin-bottom:3px} .bench .bh h3{font-size:14px}
.bench .bsub{font-size:11.5px;color:var(--cap);margin-bottom:14px}
.decomp .drow{display:flex;align-items:center;gap:10px;margin:9px 0;font-size:12px}
.decomp .drow .nm{width:84px;flex-shrink:0;color:var(--body)} .decomp .drow.me .nm{font-weight:800;color:var(--text)}
.decomp .drow .bar{flex:1;display:flex;height:24px;border-radius:6px;overflow:hidden;border:1px solid var(--border)}
.decomp .seg{height:100%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;white-space:nowrap;overflow:hidden}
.decomp .seg.cost{background:var(--navy2)} .decomp .seg.sga{background:var(--warn)} .decomp .seg.op{background:var(--emerald)} .decomp .seg.opneg{background:var(--risk)}
.decomp .drow .opv{width:62px;flex-shrink:0;text-align:right;font-weight:800}
.bench .leg{display:flex;gap:14px;font-size:11px;color:var(--cap);margin:10px 0 4px;flex-wrap:wrap}
.bench .leg .k{display:inline-flex;align-items:center;gap:5px} .bench .leg .sw{width:11px;height:11px;border-radius:3px}
.bench .growth{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.bench .gpill{font-size:11px;border-radius:999px;padding:3px 10px;background:var(--surf2);border:1px solid var(--border);color:var(--body)}
.bench .gpill b{color:var(--text)}
.bench .take{margin-top:13px;background:var(--navy5);border-radius:9px;padding:11px 13px;font-size:12px;color:var(--navy2);line-height:1.55} .bench .take b{color:var(--navy)}

/* 개선 과제 */
.lpan{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;gap:20px;flex-wrap:wrap}
.lpan .sum{flex:0 0 210px;background:var(--emerald-soft);border:1px solid var(--border-soft);border-radius:11px;padding:15px}
.lpan .sum .l{font-size:12px;color:var(--emerald-press);font-weight:600} .lpan .sum .v{font-size:24px;font-weight:800;color:var(--emerald-press);margin-top:4px}
.lpan .sum .v small{font-size:13px;color:var(--cap);font-weight:700} .lpan .sum .n{display:inline-block;margin-top:8px}
.lpan .lst{flex:1;min-width:250px}
.lrow{display:flex;align-items:center;gap:11px;padding:11px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;background:#fff;width:100%;text-align:left}
.lrow:last-child{margin-bottom:0}
.rank{width:24px;height:24px;border-radius:7px;background:var(--navy);color:#fff;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lrow .nm{flex:1;font-size:13px;color:var(--text)} .lrow .nm small{display:block;color:var(--cap);font-size:11px;margin-top:1px}
.lrow .amt{font-weight:800;color:var(--emerald-press);font-size:14px}

/* 영업 + 클레임 */
.row2{display:grid;grid-template-columns:1.3fr 1fr;gap:18px;align-items:start}
.row2-gap{margin-top:46px}
.col{min-width:0}
.colhead{display:flex;align-items:center;gap:9px;margin:0 2px 11px}
.colhead .bar{width:4px;height:17px;background:var(--emerald);border-radius:2px}
.colhead h2{font-size:15px} .colhead .s{font-size:11.5px;color:var(--cap);font-weight:400}
.panel{background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.panel .ph{padding:11px 14px;border-bottom:1px solid var(--border);font-size:12px;font-weight:700;display:flex;align-items:center;gap:8px;color:var(--text2)}
.claim-legend{display:flex;gap:14px;font-size:11px;color:var(--cap);margin-top:8px;flex-wrap:wrap;align-items:center}
.claim-legend .k{display:inline-flex;align-items:center;gap:5px}
.claim-legend .sw{width:12px;height:12px;border-radius:3px;display:inline-block}
.claim-legend .dl{width:16px;height:0;border-top:2px dashed var(--warn);display:inline-block}
.claim-tot{display:flex;gap:18px;padding:11px 14px;border-top:1px solid var(--border);background:var(--surf-hover);flex-wrap:wrap}
.claim-tot .b .l{font-size:10.5px;color:var(--cap)} .claim-tot .b .v{font-size:16px;font-weight:800;color:var(--text)}

/* 본부 카드 */
.divgroup{margin-bottom:18px}
.divgroup .gh{margin:0 2px 11px}
.divgroup .gh .tag{font-size:11px;font-weight:800;border-radius:6px;padding:3px 10px}
.divs{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.dcard{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;flex-direction:column;gap:11px;cursor:pointer;transition:.12s;border-top:4px solid var(--navy)}
.dcard:hover{border-color:var(--emerald);transform:translateY(-2px);box-shadow:0 8px 22px rgba(16,39,31,.07)}
.dcard.t-sales{border-top-color:var(--emerald)} .dcard.t-cost{border-top-color:var(--navy)} .dcard.t-ops{border-top-color:var(--navy3)}
.dcard .top{display:flex;align-items:center;gap:10px}
.dcard .top .dico{width:36px;height:36px;border-radius:10px;background:var(--surf2);color:var(--text2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dcard.t-sales .top .dico{background:var(--emerald-soft);color:var(--emerald)} .dcard.t-cost .top .dico{background:var(--navy5);color:var(--navy)}
.dcard .top .nm{font-size:14.5px;font-weight:700;flex:1;color:var(--text)}

/* ================= CALC ================= */
function impact(k){ if(k.base==null||k.target==null||k.actual==null)return null; const b=PARAMS[k.base]; if(b==null)return null; const sign=(k.st==="higher")?1:-1; return (k.actual-k.target)*b*sign; }
function signal(k){ if(k.target==null||k.actual==null)return "none";
  if(k.st==="higher"){ if(k.actual>=k.target)return "ok"; if(k.actual>=k.target*0.85)return "warn"; return "risk"; }
  if(k.st==="lower"){ if(k.actual<=k.target)return "ok"; if(k.actual<=k.target*1.1)return "warn"; return "risk"; }
  if(k.actual<=k.target)return "ok"; if(k.actual<=k.target+1)return "warn"; return "risk"; }
const SIGW={risk:3,warn:2,ok:1,none:0},SIGLAB={ok:"정상",warn:"주의",risk:"위험",none:"미입력"};
const fmtM=v=>v==null?"—":(v<0?"−":"")+Math.abs(v).toLocaleString(undefined,{maximumFractionDigits:0})+"백만";
const pct=(v,d)=>v==null?"—":(v*100).toFixed(d==null?1:d)+"%";
function dispKpiV(k,v){ if(v==null)return "—"; if(k.unit==="%")return (v*100).toFixed(v<0.1?2:1)+"%"; return v.toLocaleString()+(k.unit==="배"?"배":k.unit); }
function sigInline(s){return `<span class="sig ${s}"><span class="dot"></span>${SIGLAB[s]}</span>`;}
function sigPill(s){return `<span class="sig pill ${s}"><span class="dot"></span>${SIGLAB[s]}</span>`;}
function tagBadge(t){return t==="핵심"?'<span class="tagb core">핵심</span>':(t==="특임"?'<span class="tagb spec">특임</span>':'');}
function tagChip(t){return t==="핵심"?'<span class="tg core">핵심</span>':(t==="특임"?'<span class="tg spec">특임</span>':'');}
function expectedProgress(){return META.baseMonth/12;}
function divAch(d){ return d.revCum==null?null:d.revCum/d.revTarget; }
function divState(id){
  const d=DIVS.find(x=>x.id===id);
  if(d.revCum!=null){const ach=divAch(d),exp=expectedProgress();const pace=ach/exp;
    if(pace>=0.98)return "ok"; if(pace>=0.90)return "warn"; return "risk";}
  if(d.cardKpi&&d.cardKpi.actual!=null)return signal(d.cardKpi);
  return "none";
}
function stateColor(s){return s==='ok'?'var(--emerald)':s==='warn'?'var(--warn)':s==='risk'?'var(--risk)':'#c2c6cc';}

function opGauge(E){
  const target=HR.opTarget;
  let pos;
  if(E.profitCum<0) pos=Math.max(3,33*(1+Math.max(E.profitCum,-target)/target));
  else if(E.profitCum<target) pos=33+(E.profitCum/target)*34;
  else pos=Math.min(67+(E.profitCum-target)/target*33,97);
  return `<div class="opg">
    <div class="opg-mk"><span style="left:0%">적자</span><span style="left:33%">손익분기</span><span style="left:67%">목표</span><span style="left:100%">탁월</span></div>

function renderKstat(){
  let cnt={ok:0,warn:0,risk:0,none:0}; KPIS.forEach(k=>cnt[signal(k)]++);
  let h=`<div class="kstat">
    <div class="kstat-sub">신호등을 누르면 해당 색의 KPI만, 다시 누르면 전체를 봅니다.</div>
    <div class="kstat-lights">
      <div class="klight ok ${kstatSel==='ok'?'sel':''}" data-kl="ok"><div class="bulb ok">${cnt.ok}</div><div class="lab">정상 <span class="cnt">${cnt.ok}개</span></div></div>
      <div class="klight warn ${kstatSel==='warn'?'sel':''}" data-kl="warn"><div class="bulb warn">${cnt.warn}</div><div class="lab">주의 <span class="cnt">${cnt.warn}개</span></div></div>
      <div class="klight risk ${kstatSel==='risk'?'sel':''}" data-kl="risk"><div class="bulb risk">${cnt.risk}</div><div class="lab">위험 <span class="cnt">${cnt.risk}개</span></div></div>
    </div>
    <div class="kstat-list" id="kstatList"></div></div>`;
  document.getElementById("kstatBox").innerHTML=h;
  document.querySelectorAll('[data-kl]').forEach(b=>b.onclick=()=>{kstatSel=(kstatSel===b.dataset.kl)?null:b.dataset.kl;renderKstat();});
  renderKstatList();
}
function renderKstatList(){
  const nm={risk:"위험",warn:"주의",ok:"정상"}; const sgs=kstatSel?[kstatSel]:["risk","warn","ok"]; let h="";
  sgs.forEach(sg=>{const ks=KPIS.filter(k=>signal(k)===sg); if(!ks.length)return;
    h+=`<div class="grph"><span class="kstat-dot ${sg}"></span>${nm[sg]} · ${ks.length}건</div>`;
    h+=ks.map(k=>`<button class="kstat-tag ${sg}" data-gokpi="${k.div}"><span class="d"></span>${k.name} <small>${k.team}</small></button>`).join("");});
  if(!h)h=`<div class="tiny muted">표시할 KPI가 없습니다.</div>`;
  document.getElementById("kstatList").innerHTML=h;
  document.querySelectorAll('[data-gokpi]').forEach(b=>b.onclick=()=>openDiv(b.dataset.gokpi));
}

function benchBlock(){
  const rows=BENCH.rows.map(c=>{
    const negOp=c.op<0; let cw=c.cost,sw=c.sga,ow=Math.max(c.op,0);
    if(negOp){const tot=c.cost+c.sga; cw=c.cost/tot*100; sw=c.sga/tot*100; ow=0;}
    const segCost=`<div class="seg cost" style="width:${cw}%">${cw>14?'원가 '+c.cost.toFixed(0)+'%':''}</div>`;
    const segSga=`<div class="seg sga" style="width:${sw}%">${sw>14?'판관 '+c.sga.toFixed(0)+'%':''}</div>`;
    const segOp=ow>0?`<div class="seg op" style="width:${ow}%">${ow>6?c.op.toFixed(1)+'%':''}</div>`:'';
    const opv=`<span class="opv" style="color:${c.op>=0?'var(--ok-ink)':'var(--risk-ink)'}">${c.op.toFixed(1)}%</span>`;
    return `<div class="drow ${c.me?'me':''}"><span class="nm">${c.nm}</span><span class="bar">${segCost}${segSga}${segOp}</span>${opv}</div>`;
  }).join("");
  const growth=BENCH.growth.map(g=>`<span class="gpill"><b>${g.nm}</b> ${g.v>=0?'+':''}${g.v.toFixed(1)}%</span>`).join("");
  const expl=`<b>매출 100% = 원가 + 판관비 + 영업이익</b><br>영업이익률이 낮은 곳은 원가가 높은지 판관비가 높은지 바로 보입니다. 맨 오른쪽 초록이 영업이익률이에요.`;
  return `<div class="bench">
    <div class="bh">${ic(ICON.pct,16)}<h3>경쟁사 수익성 비교</h3> ${info(expl)}</div>
    <div class="bsub">${BENCH.period}</div>
    <div class="decomp">${rows}</div>
    <div class="leg"><span class="k"><span class="sw" style="background:var(--navy2)"></span>원가율</span><span class="k"><span class="sw" style="background:var(--warn)"></span>판관비율</span><span class="k"><span class="sw" style="background:var(--emerald)"></span>영업이익률(+)</span><span class="k"><span class="sw" style="background:var(--risk)"></span>적자(−)</span></div>
    <div class="growth"><span class="tiny muted" style="align-self:center">매출성장률(YoY):</span>${growth}</div>
    <div class="take">회사별 수익성 저하 요인이 다릅니다. <b>코아스는 비용 효율성을 기반으로 영업이익률 1위</b>를 기록했습니다. 현대리바트는 원가율, 퍼시스는 판관비율 관리가 주요 개선 과제로 확인됩니다.</div>
  </div>`;
}

function claimChart(){
  const W=460,H=190,pl=30,pr=30,pt=22,pb=24,iw=W-pl-pr,ih=H-pt-pb;
  const m=CLAIM.month,cnt=CLAIM.count,cost=CLAIM.costM;
  const maxC=Math.max(...cnt.filter(v=>v!=null),1)*1.15,maxK=Math.max(...cost.filter(v=>v!=null),0.1)*1.28;
  const bw=Math.min(iw/m.length*0.46,30);
  let svg=`<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" style="display:block;max-height:200px">`;
  for(let g=0;g<=2;g++){const y=pt+ih*g/2;svg+=`<line x1="${pl}" y1="${y.toFixed(1)}" x2="${W-pr}" y2="${y.toFixed(1)}" stroke="#eef0f2"/>`;}
  m.forEach((mm,i)=>{const cx=pl+iw*(i+0.5)/m.length;
    if(cnt[i]!=null){const bh=cnt[i]/maxC*ih;const top=pt+ih-bh;
      svg+=`<rect x="${(cx-bw/2).toFixed(1)}" y="${top.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="3" fill="var(--navy)"/>`;
      svg+=`<text x="${cx.toFixed(1)}" y="${(top-5).toFixed(1)}" font-size="10" font-weight="700" fill="var(--navy2)" text-anchor="middle">${cnt[i]}</text>`;}
    svg+=`<text x="${cx.toFixed(1)}" y="${H-7}" font-size="10" fill="#869389" text-anchor="middle">${mm}</text>`;});
  let pts=[],lbl="";
  m.forEach((mm,i)=>{if(cost[i]!=null){const cx=pl+iw*(i+0.5)/m.length;const cy=pt+ih-(cost[i]/maxK*ih);pts.push([cx,cy]);
    const ly=Math.min(cy+14,pt+ih+11);
    lbl+=`<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="3.5" fill="var(--risk)"/><text x="${cx.toFixed(1)}" y="${ly.toFixed(1)}" font-size="10" font-weight="700" fill="var(--risk-ink)" text-anchor="middle" style="paint-order:stroke" stroke="#ffffff" stroke-width="3">${cost[i].toFixed(1)}</text>`;}});
  if(pts.length>1)svg+=`<polyline points="${pts.map(p=>p[0].toFixed(1)+","+p[1].toFixed(1)).join(" ")}" fill="none" stroke="var(--risk)" stroke-width="2.2"/>`;
  return svg+lbl+`</svg>`;
}

function renderDivGroups(){
  let h="";
  ["sales","cost","ops"].forEach(tp=>{
    const t=TYPE[tp];
    const style=tp==='sales'?'color:var(--emerald-press);background:var(--emerald-soft);border:1px solid var(--border-soft)':tp==='cost'?'color:var(--navy);background:var(--navy5);border:1px solid var(--navy-border)':'color:var(--navy2);background:var(--surf2);border:1px solid var(--border)';
    h+=`<div class="divgroup"><div class="gh"><span class="tag" style="${style}">${t.label}</span></div>
      <div class="divs">${DIVS.filter(d=>d.type===tp).map(divCard).join("")}</div></div>`;

function divChips(id){
  const tagged=[];(TEAMS[id]||[]).forEach(t=>t.kpis.forEach(k=>{if(k.tag==="핵심"||k.tag==="특임")tagged.push(k);}));
  return tagged.slice(0,3).map(k=>`<span class="chip">${tagChip(k.tag)}${k.name}</span>`).join("")||`<span class="tiny muted">등록 KPI 없음</span>`;
}
function paceInfo(d){
  const ach=divAch(d),exp=expectedProgress();
  return `<b>달성률 = 연간목표 대비 누계 실적</b>입니다.<br>
  <div class="row"><span>연간목표</span><span>${fmtM(d.revTarget)}</span></div>
  <div class="row"><span>현재 누계실적</span><span>${fmtM(d.revCum)}</span></div>
  <div class="row"><span>달성률</span><span>${pct(ach)}</span></div>
  <br>아직 ${META.baseMonth}월이라 연간의 ${(exp*100).toFixed(0)}%(${META.baseMonth}/12)만 지났습니다. 이 시점에 ${(exp*100).toFixed(0)}%면 정상 페이스 → 현재 ${pct(ach)}는 기대 페이스의 <b>${(ach/exp*100).toFixed(0)}%</b> 수준입니다.`;
}
function divCard(d){
  const st=divState(d.id), scol=stateColor(st);
  const exp=expectedProgress();
  let mid="", foot="";
  if(d.revCum!=null){
    const ach=divAch(d), paceDiff=(ach-exp)*100;
    mid=`<div class="dc-l">매출 누계</div>
      <div class="dc-v">${d.revCum.toLocaleString()}<small>백만</small></div>
      <div class="dc-t">연간 목표 ${d.revTarget.toLocaleString()}백만</div>
      <div class="dc-bar"><div class="dc-fill" style="width:${Math.min(ach*100,100)}%;background:${scol}"></div></div>
      <div class="dc-prow"><b style="color:${scol}">${pct(ach)} 달성</b><span class="muted">기대 진도 ${(exp*100).toFixed(0)}%</span></div>`;
    if(paceDiff<0) mid+=`<div class="dc-info">${ic(ICON.warn,12)} 기대 진도 대비 ${paceDiff.toFixed(1)}%p${d.gapNote?' · '+d.gapNote:''}</div>`;
    foot = paceDiff>=0
      ? `<div class="dc-foot"><span class="dc-fnote up">기대 대비 +${paceDiff.toFixed(1)}%p 초과</span><button class="dc-btn">상세 분석 ↗</button></div>`
      : `<div class="dc-foot"><span class="dc-fnote muted">${d.coreGoal}</span><button class="dc-btn">개선 방안 ↗</button></div>`;
  } else if(d.cardKpi){
    const ck=d.cardKpi;
    const ratio=ck.actual==null?null:(ck.st==="lower"?(ck.actual?ck.target/ck.actual:0):(ck.target?ck.actual/ck.target:0));
    mid=`<div class="dc-l">${ck.name}</div>
      <div class="dc-v">${dispKpiV(ck,ck.actual)}</div>
      <div class="dc-t">목표 ${dispKpiV(ck,ck.target)}</div>
      <div class="dc-bar"><div class="dc-fill" style="width:${ratio==null?0:Math.max(0,Math.min(ratio,1))*100}%;background:${scol}"></div></div>
      <div class="dc-prow"><b style="color:${scol}">${ratio==null?'실적 미입력':'달성률 '+(ratio*100).toFixed(0)+'%'}</b></div>`;
    foot=`<div class="dc-foot"><span class="dc-fnote muted">${d.coreGoal}</span><button class="dc-btn">상세 분석 ↗</button></div>`;
  }
  return `<div class="dcard t-${d.type}" data-div="${d.id}">
    <div class="dc-head"><span class="dico">${ic(ICON[d.icon],19)}</span><span class="dc-nm">${d.name}</span>${sigPill(st)}</div>
    ${mid}
    <div class="dc-tasks"><div class="dc-th">진행 중 과제</div>${divChips(d.id)}</div>
    ${foot}</div>`;
}

let curDiv=null;
function openDiv(id){curDiv=id;showView("div");renderDiv();renderSidebar('div');window.scrollTo(0,0);}
function aiComment(d,st){
  const risks=KPIS.filter(k=>k.div===d.id&&signal(k)==="risk");
  if(st==="ok") return `정렬 과제가 순항 중입니다. <b>${d.coreGoal}</b> 기조를 유지하세요.`;
  if(st==="warn") return `일부 지표가 목표에 근접하지 못했습니다. <b>${d.node.act}</b> 중심으로 선제 점검이 필요합니다.`;
  if(st==="risk"){const rn=risks.map(k=>k.name).join(", ")||d.node.lag;return `<b>${rn}</b>이(가) 위험 신호입니다. <b>${d.node.act}</b>를 우선 실행해 병목을 해소하세요.`;}
  return `입력된 실적이 없어 신호를 판정할 수 없습니다. 실적 입력 시 코멘트가 자동 표시됩니다.`;
}
function gaugeLine(k){
  const s=signal(k),col=stateColor(s);
  if(k.actual==null) return `<div class="gline muted">실적 — (미입력) · 목표 ${dispKpiV(k,k.target)}</div>`;
  if(k.st==="count") return `<div class="gline">목표 ${k.target}${k.unit} · 실적 <b style="color:${col}">${k.actual}${k.unit}</b></div>`;

  }
  return `<div class="flowwrap"><div class="flowchain">

}

function zIdx(z,v){let i=z.findIndex(x=>v>=x.lo&&v<x.hi);return i<0?(v<z[0].lo?0:z.length-1):i;}

function zoneBarLine(z,v,label){

    h+=`<div class="divgroup"><div class="gh"><span class="tiny muted" style="margin-right:8px">${g.label}</span><span class="tag" style="${style}">${g.tag}</span></div><div class="deptgrid">`;
    h+=list.map(d=>{
      const cm=(d.rev!=null&&d.vc!=null)?(d.rev-d.vc)/d.rev:null;
      const hasData=cm!=null;
      const cmDiff=hasData?(cm-HR.cmRate)*100:null;
      const dotC=hasData?'#869389':'#c2c6cc';
      let foot;
      if(g.key==='ops'){
        foot=`인건비 ${d.laborD>=0?'+':''}${d.laborD.toFixed(1)}% · HCROI 현재값 <b>—</b> (부서 영업이익 배분 후 산출)`;
      } else if(hasData){
        foot=`공헌이익율 <b>${(cm*100).toFixed(0)}%</b> · 전사 ${(HR.cmRate*100).toFixed(1)}% 기준 <b class="${cmDiff>=0?'up':'dn'}">${cmDiff>=0?'+':''}${cmDiff.toFixed(1)}%p</b><br>귀속매출 <b>${d.rev.toLocaleString()}백만</b>`;
      } else {
        foot=`귀속매출·공헌이익율 입력 대기 · 인건비 ${d.laborD>=0?'+':''}${d.laborD.toFixed(1)}%`;
      }
      const badge=hasData?'<span class="dpct">공헌이익율 기준</span>':'<span class="dpct gray">데이터 없음</span>';
      return `<div class="deptcard2">
        <div class="dh"><span class="dn">${d.name}</span><span class="ddot" style="background:${dotC}"></span></div>
        <div class="dmeta">현원 ${d.fte}명 (이전 ${d.prevFte}명)</div>
        <div class="dval2">—<small>${g.key==='ops'?'HCROI':'HCVA'}</small></div>
        ${badge}
        <div class="dbar"><span style="flex:1;background:#eef0f2"></span></div>
        <div class="dfoot2">${foot}</div>
      </div>`;
    }).join("");
    h+=`</div></div>`;
  });
  document.getElementById("deptArea").innerHTML=h;
}

/* ================= 라우팅 / 사이드바 토글 ================= */
function showView(v){["corp","div","hr"].forEach(x=>document.getElementById("view-"+x).classList.toggle("hidden",x!==v));}
function goHome(){renderCorp();showView("corp");renderSidebar("corp");window.scrollTo(0,0);}
function isMobile(){return window.innerWidth<=1000;}
function closeMobile(){if(isMobile()){document.getElementById("app").classList.remove("sbshow");document.getElementById("backdrop").classList.remove("on");}}
function toggleSidebar(){
  const app=document.getElementById("app");
  if(isMobile()){const on=app.classList.toggle("sbshow");document.getElementById("backdrop").classList.toggle("on",on);}
  else app.classList.toggle("sbhide");
}

/* ================= INIT / LOGIN ================= */
function startApp(){
  document.getElementById("login").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  document.getElementById("bm").textContent=META.baseMonth+"월";
  document.getElementById("upd").textContent=META.lastUpdated;
  try{ renderSidebar("corp"); renderCorp(); showView("corp"); }
  catch(err){ document.getElementById("view-corp").innerHTML='<div style="padding:30px;color:#dc2626;font-size:13px">화면을 그리는 중 오류가 발생했습니다: '+(err&&err.message||err)+'</div>'; showView("corp"); }
  document.getElementById("burger").onclick=toggleSidebar;
  document.getElementById("sbCollapse").onclick=toggleSidebar;
  document.getElementById("logoHome").onclick=goHome;
  document.getElementById("titleHome").onclick=goHome;
  document.getElementById("titleHome2").onclick=goHome;
  document.getElementById("logoutBtn").onclick=doLogout;
  document.getElementById("backdrop").onclick=closeMobile;
}
function doLogout(){_started=false;document.getElementById("app").classList.add("hidden");document.getElementById("login").classList.remove("hidden");document.getElementById("lid").value="";document.getElementById("lpw").value="";document.getElementById("loginErr").textContent="";try{document.getElementById("lid").focus();}catch(_){}}
let _started=false;
function tryLogin(){
  if(_started)return;
  const id=(document.getElementById("lid").value||"").trim(), pw=(document.getElementById("lpw").value||"").trim();
  if(id==="koas"&&pw==="koas2026"){ _started=true; try{startApp();}catch(err){_started=false;document.getElementById("loginErr").textContent="오류가 발생했습니다. 다시 시도해 주세요.";} }
  else document.getElementById("loginErr").textContent="아이디 또는 비밀번호가 올바르지 않습니다.";
}
(function bindLogin(){
  const btn=document.getElementById("loginBtn");
  btn.setAttribute("type","button");
  btn.addEventListener("click",function(e){e.preventDefault();tryLogin();});
  const onEnter=e=>{if(e.key==="Enter"){e.preventDefault();tryLogin();}};
  ["lid","lpw"].forEach(idn=>{const el=document.getElementById(idn);el.addEventListener("keydown",onEnter);el.addEventListener("keyup",onEnter);});
  document.getElementById("login").addEventListener("keydown",onEnter);
  try{document.getElementById("lid").focus();}catch(_){}
})();

/* ===== 우클릭 · 드래그 · 캡처(복사) 금지 ===== */
document.addEventListener("contextmenu",e=>e.preventDefault());
document.addEventListener("dragstart",e=>e.preventDefault());
document.addEventListener("selectstart",e=>{const t=e.target;if(t&&t.tagName==="INPUT")return;e.preventDefault();});
document.addEventListener("copy",e=>e.preventDefault());
document.addEventListener("cut",e=>e.preventDefault());
document.addEventListener("keydown",e=>{
  const k=(e.key||"").toLowerCase();
  if(k==="printscreen"){e.preventDefault();}
  if((e.ctrlKey||e.metaKey)&&["c","x","s","p","u"].includes(k)){
    const t=e.target;if(t&&t.tagName==="INPUT")return; e.preventDefault();
  }
  if(e.key==="F12")e.preventDefault();
});
document.addEventListener("keyup",e=>{ if((e.key||"").toLowerCase()==="printscreen"){ try{navigator.clipboard.writeText("");}catch(_){}}});
</script>
