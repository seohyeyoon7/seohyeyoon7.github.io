<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>KOAS KPI 경영 대시보드</title>
<style>
:root{
  /* 1. Primary — 인터랙션 (에메랄드) */
  --emerald:#1e8e5a; --emerald-press:#19774b; --emerald-soft:#e6f4ec;
  /* 2. Brand — 다크 면 (포레스트) */
  --forest:#26473a; --forest-line:#1b332a; --lime:#9fd356;
  /* 3. Data — 데이터 시각화 (네이비) */
  --navy:#234876; --navy2:#4a6794; --navy3:#6f86b0; --navy4:#cdd8e8; --navy5:#e8eff7;
  --navy-box:#eef3f8; --navy-border:#dce5f0;
  /* 4. Surface & Border */
  --white:#fff; --surf2:#f3f6f4; --surf-hover:#f7faf8; --border:#e4eae6; --border-soft:#d3e7da;
  /* 5. Text */
  --text:#16271f; --text2:#2e3d36; --body:#52635b; --cap:#869389; --ph:#aab4ad;
  /* 6. Semantic — 신호등 (변경 금지) */
  --ok:#16a34a; --ok-ink:#15803d; --ok-soft:rgba(22,163,74,.12);
  --warn:#e8a317; --warn-ink:#b45309; --warn-soft:rgba(232,163,23,.14);
  --risk:#f04452; --risk-ink:#dc2626; --risk-soft:rgba(240,68,82,.12);
  --bg:#f3f6f4; --radius:14px;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--body);font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic","Segoe UI",sans-serif;font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;font-variant-numeric:tabular-nums;
  -webkit-user-select:none;-moz-user-select:none;user-select:none;-webkit-touch-callout:none}
input,textarea,select{-webkit-user-select:text;user-select:text}
img,svg{-webkit-user-drag:none;user-drag:none}
h1,h2,h3,h4{margin:0;font-weight:700;letter-spacing:-.3px;color:var(--text)}
.muted{color:var(--cap)} .tiny{font-size:11.5px}
button{font-family:inherit;cursor:pointer}
svg.ic{display:block}
::selection{background:rgba(30,142,90,.15)}

.app{display:flex;min-height:100vh}

/* ---- Login ---- */
.login{position:fixed;inset:0;z-index:200;background:
  linear-gradient(rgba(20,40,32,.90),rgba(31,58,47,.86)),
  radial-gradient(120% 120% at 80% 10%, #2f5848 0%, #1b332a 70%);
  display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{width:100%;max-width:380px;background:var(--white);border-radius:18px;padding:34px 30px 28px;box-shadow:0 24px 70px rgba(16,39,31,.45)}
.login-card .brand{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.login-card .brand .mark{width:40px;height:40px;border-radius:11px;background:var(--emerald);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:18px}
.login-card .brand b{font-size:18px;color:var(--text);display:block}
.login-card .brand span{font-size:12px;color:var(--cap)}
.login-card .hr{height:2px;background:var(--lime);width:42px;border-radius:2px;margin:18px 0 14px}
.login-card label{display:block;font-size:12px;color:var(--body);margin:12px 0 5px;font-weight:600}
.login-card input{width:100%;padding:11px 13px;border:1px solid var(--border);border-radius:10px;font:inherit;font-size:14px;color:var(--text)}
.login-card input::placeholder{color:var(--ph)}
.login-card input:focus{outline:none;border-color:var(--emerald);box-shadow:0 0 0 3px rgba(30,142,90,.14)}
.login-btn{width:100%;margin-top:20px;padding:12px;border:none;border-radius:10px;background:var(--emerald);color:#fff;font-weight:700;font-size:14.5px}
.login-btn:hover{background:var(--emerald-press)}
.login-err{color:var(--risk-ink);font-size:12px;margin-top:10px;min-height:16px}
.login-hint{font-size:11px;color:var(--cap);margin-top:14px;text-align:center;line-height:1.5}

/* ---- Sidebar (forest dark) ---- */
.sidebar{width:250px;flex-shrink:0;background:var(--forest);border-right:1px solid var(--forest-line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;transition:margin-left .22s ease;z-index:60}
.app.sbhide .sidebar{margin-left:-251px}
.sb-logo{display:flex;align-items:center;gap:11px;padding:18px 18px 16px;cursor:pointer;border-bottom:1px solid var(--forest-line)}
.sb-logo .mark{width:34px;height:34px;border-radius:9px;background:var(--emerald);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px;flex-shrink:0}
.sb-logo b{font-size:15px;display:block;letter-spacing:-.2px;color:#fff}
.sb-logo span{font-size:11px;color:rgba(255,255,255,.55)}
.sb-nav{flex:1;overflow-y:auto;padding:8px 10px 10px}
.sb-grp{font-size:10px;font-weight:700;letter-spacing:.4px;color:rgba(255,255,255,.45);text-transform:uppercase;padding:14px 8px 6px}
.sb-item{display:flex;align-items:center;gap:10px;width:100%;padding:9px 10px;border:none;background:none;color:rgba(255,255,255,.78);border-radius:9px;font-size:13px;text-align:left;margin-bottom:2px;transition:.12s}
.sb-item:hover{background:rgba(255,255,255,.07);color:#fff}
.sb-item.active{background:rgba(159,211,86,.18);color:var(--lime);font-weight:700}
.sb-item .ic{flex-shrink:0} .sb-item .lbl{flex:1}
.sb-item .dotsig{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sb-sub{font-size:9.5px;color:rgba(255,255,255,.4);padding:2px 10px 4px 38px;margin-top:-2px}
.sb-foot{padding:12px 14px;border-top:1px solid var(--forest-line)}
.sb-demo{font-size:10.5px;color:var(--lime);background:rgba(159,211,86,.1);border:1px dashed rgba(159,211,86,.4);border-radius:8px;padding:8px 10px;line-height:1.45}
.sb-logout{margin-top:9px;width:100%;padding:8px;border:1px solid var(--forest-line);background:transparent;color:rgba(255,255,255,.7);border-radius:8px;font-size:12px}
.sb-logout:hover{background:rgba(255,255,255,.06);color:#fff}
.backdrop{display:none;position:fixed;inset:0;background:rgba(16,39,31,.45);z-index:50}
.backdrop.on{display:block}

/* ---- Main ---- */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:13px;padding:16px 26px 14px;background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:30}
.burger{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;color:var(--text);flex-shrink:0}
.burger:hover{border-color:var(--emerald);color:var(--emerald)}
.topbar .ttl{cursor:pointer;min-width:0}
.topbar .ttl h1{font-size:23px;line-height:1.15}
.topbar .ttl .sub{font-size:12.5px;color:var(--emerald-press);margin-top:3px;font-weight:600}
.topbar .sp{flex:1}
.topbar .meta{font-size:11.5px;color:var(--cap);text-align:right;line-height:1.6}
.topbar .meta b{color:var(--text2)}
.upd-btn{cursor:pointer;border-bottom:1px dashed var(--navy3);color:var(--navy)}
.upd-btn:hover{color:var(--emerald);border-color:var(--emerald)}
.content{padding:22px 26px 70px;max-width:1200px}

.sec{display:flex;align-items:baseline;gap:10px;margin:30px 2px 14px}
.sec-gap{margin-top:46px}
.sec:first-child{margin-top:4px}
.sec .bar{width:4px;height:18px;background:var(--emerald);border-radius:2px;align-self:center}
.sec h2{font-size:16px}
.sec .s{font-size:12px;color:var(--cap);font-weight:400}

/* signal */
.sig{display:inline-flex;align-items:center;gap:6px;font-weight:700;white-space:nowrap;font-size:12px}
.sig .dot{width:9px;height:9px;border-radius:50%}
.sig.ok{color:var(--ok-ink)} .sig.ok .dot{background:var(--ok)}
.sig.warn{color:var(--warn-ink)} .sig.warn .dot{background:var(--warn)}
.sig.risk{color:var(--risk-ink)} .sig.risk .dot{background:var(--risk)}
.sig.none{color:var(--cap)} .sig.none .dot{background:#c2c6cc}
.sig.pill{padding:3px 11px;border-radius:999px}
.sig.pill.ok{background:var(--ok-soft)} .sig.pill.warn{background:var(--warn-soft)}
.sig.pill.risk{background:var(--risk-soft)} .sig.pill.none{background:var(--surf2)}

.estbadge{font-size:10px;font-weight:700;color:var(--navy2);background:var(--navy5);border:1px dashed var(--navy-border);border-radius:5px;padding:1px 6px}
.realbadge{font-size:10px;font-weight:700;color:var(--ok-ink);background:var(--ok-soft);border:1px solid rgba(22,163,74,.3);border-radius:5px;padding:1px 6px}
.tagb{font-size:10px;font-weight:800;border-radius:5px;padding:1px 6px}
.tagb.core{color:var(--emerald-press);background:var(--emerald-soft);border:1px solid var(--border-soft)}
.tagb.spec{color:var(--warn-ink);background:var(--warn-soft);border:1px solid rgba(232,163,23,.3)}

/* ===== 단일 KPI 카드 (계층형) ===== */
.kc{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 1px 3px rgba(16,39,31,.04)}
.kpi-one{overflow:hidden;border-left:5px solid var(--emerald)}
/* 상위 지표 (지금까지 남긴 이익) */
.kc-main{padding:20px 22px 18px}
.kc-main .lab{display:flex;align-items:center;gap:8px;font-size:13.5px;color:var(--body);font-weight:600}
.kc-main .lab .ico{width:30px;height:30px;border-radius:9px;background:var(--emerald-soft);color:var(--emerald);display:flex;align-items:center;justify-content:center}
.kc-main-row{display:flex;gap:32px;align-items:flex-end;flex-wrap:wrap;margin-top:6px}
.kc-main-row .big{font-size:42px;font-weight:800;letter-spacing:-1px;color:var(--text);line-height:1}
.kc-main-row .big small{font-size:17px;font-weight:700;color:var(--cap)}
.kc-main-stat{display:flex;gap:26px;flex-wrap:wrap;padding-bottom:3px}
.kc-main-stat .b .l{font-size:11px;color:var(--cap)} .kc-main-stat .b .v{font-size:18px;font-weight:800;margin-top:3px;color:var(--text2)}
/* 보조 KPI (원인 분석 영역 — 독립 카드 아님) */
.kc-sub{background:var(--surf2);border-top:1px solid var(--border);padding:15px 22px 16px}
.kc-sub-grid{display:grid;grid-template-columns:1fr 1fr}
.subkpi{padding:2px 20px}
.subkpi:first-child{padding-left:6px}
.subkpi.div{border-left:1px solid var(--border)}
.subkpi .t{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--body);font-weight:600}
.subkpi .t svg{color:var(--navy)}
.subkpi .v{font-size:24px;font-weight:800;letter-spacing:-.5px;margin:5px 0 7px;color:var(--text)}
.subkpi .v small{font-size:13px;font-weight:700;color:var(--cap)}
.subkpi .meta{display:flex;flex-wrap:wrap;gap:4px 14px;font-size:11.5px;color:var(--cap);align-items:center}
.subkpi .meta b{color:var(--text2);font-weight:800}
.subkpi .sx{margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);font-size:11.5px;color:var(--body)}
.subkpi .sx b{font-weight:800}
.dn{color:var(--risk-ink);font-weight:700} .up{color:var(--ok-ink);font-weight:700}
/* 지표별 AI 인사이트 (각 KPI 아래) */
.kpi-ins{margin-top:10px;font-size:12.5px;line-height:1.55;color:var(--text2)}
.kc-main .kpi-ins{padding-top:11px;border-top:1px dashed var(--border)}
.subkpi .kpi-ins{padding-top:9px;border-top:1px dashed var(--border)}
/* 카드 하단 한 줄 종합 */
.kc-syn{border-top:1px solid var(--border);background:var(--emerald-soft);padding:13px 22px;font-size:13px;font-weight:600;color:var(--text);line-height:1.55}
.kc-syn .arrow{color:var(--emerald-press);font-weight:700;margin-right:4px}

/* 경쟁사 벤치마킹 */
.bench{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px}
.bench .bh{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.bench .bh h3{font-size:14px}
.bench .bsub{font-size:11.5px;color:var(--cap);margin-bottom:14px}
.bench .cgrid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.costchart .row{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:12px}
.costchart .row .nm{width:84px;flex-shrink:0;color:var(--body)}
.costchart .row .track{flex:1;background:var(--surf2);border-radius:6px;height:20px;position:relative;overflow:hidden}
.costchart .row .fill{position:absolute;left:0;top:0;bottom:0;border-radius:6px;display:flex;align-items:center;justify-content:flex-end;padding-right:7px;color:#fff;font-size:10.5px;font-weight:800}
.costchart .row.me .nm{font-weight:800;color:var(--text)}
.bench .mini{font-size:13.5px}
.bench .mini .mr{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.bench .mini .mr:last-child{border:none}
.bench .mini .mr .k{color:var(--body);font-weight:600} .bench .mini .mr .v{font-weight:800;color:var(--text);font-size:15px}
.bench .mini .mr .v.win{color:var(--ok-ink)}

/* 성과 공유 여력 */
.share{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px}
.share .sh{font-size:15px;color:var(--text2);font-weight:600;margin-bottom:20px;line-height:1.65}
.gauge-wrap{position:relative;margin:46px 0 6px}
.gaugebar{display:flex;height:40px;border-radius:11px;overflow:hidden}
.gaugebar .seg{flex:1;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;text-align:center;padding:0 4px}
.gauge-wrap .pointer{position:absolute;top:-6px;bottom:-6px;transform:translateX(-50%);transition:left .4s;z-index:3;display:flex;align-items:center}
.gauge-wrap .pointer .pin{width:2px;height:100%;background:var(--text);border-radius:2px;box-shadow:0 0 0 2px #fff}
.gauge-wrap .pointer .bdg{position:absolute;bottom:calc(100% + 7px);left:50%;transform:translateX(-50%);background:var(--text);color:#fff;font-size:11.5px;font-weight:800;border-radius:7px;padding:4px 11px;white-space:nowrap}
.gauge-wrap .pointer .bdg::after{content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--text)}
.share-state{background:var(--emerald-soft);border:1px solid var(--border-soft);border-radius:11px;padding:13px 16px;margin-top:22px;font-size:13px;color:var(--text2);line-height:1.6}
.share-state b{font-weight:800}
.share-note{margin-top:12px;font-size:10.5px;color:var(--cap);line-height:1.6;border-top:1px dashed var(--border);padding-top:10px}
.share-note p{margin:3px 0;display:flex;gap:6px} .share-note p::before{content:"※";color:var(--navy3)}

/* 손실 Top3 = 개선 과제 */
.lpan{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;gap:20px;flex-wrap:wrap}
.lpan .sum{flex:0 0 210px;background:var(--emerald-soft);border:1px solid var(--border-soft);border-radius:11px;padding:15px}
.lpan .sum .l{font-size:12px;color:var(--emerald-press);font-weight:600} .lpan .sum .v{font-size:25px;font-weight:800;color:var(--emerald-press);margin-top:4px}
.lpan .sum .v .op{font-size:13px;color:var(--cap);font-weight:700}
.lpan .sum .n{display:inline-block;margin-top:8px}
.lpan .lst{flex:1;min-width:250px}
.lrow{display:flex;align-items:center;gap:11px;padding:10px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;background:var(--white);transition:.12s;cursor:pointer;width:100%;text-align:left}
.lrow:hover{border-color:var(--emerald);background:var(--surf-hover);transform:translateX(2px)}
.lrow:last-child{margin-bottom:0}
.rank{width:24px;height:24px;border-radius:7px;background:var(--navy);color:#fff;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lrow .nm{flex:1;font-size:13px;color:var(--text)} .lrow .nm small{display:block;color:var(--cap);font-size:11px;margin-top:1px}
.lrow .amt{font-weight:800;color:var(--emerald-press);font-size:14px}
.lrow .go{color:var(--emerald);font-size:16px;flex-shrink:0}

/* 어떻게 벌고 있을까 + 클레임 */
.row2{display:grid;grid-template-columns:1.3fr 1fr;gap:18px;align-items:start}
.row2-gap{margin-top:46px}
.col{min-width:0}
.colhead{display:flex;align-items:center;gap:9px;margin:0 2px 11px}
.colhead .bar{width:4px;height:17px;background:var(--emerald);border-radius:2px}
.colhead h2{font-size:15px}
.colhead .s{font-size:11.5px;color:var(--cap);font-weight:400}
.panel{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.panel .ph{padding:11px 14px;border-bottom:1px solid var(--border);font-size:12px;font-weight:700;display:flex;align-items:center;gap:8px;color:var(--text2)}
.panel .ph .ico{color:var(--emerald)}
.minicharts{display:flex;flex-direction:column}
.mchart{padding:13px 15px;border-bottom:1px solid var(--border)}
.mchart:last-child{border-bottom:none}
.mchart .t{font-size:11.5px;font-weight:700;color:var(--text2);margin-bottom:2px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.mchart .t .badge{font-weight:700}
.mchart .cm{font-size:11px;color:var(--navy2);margin-top:7px;background:var(--navy5);border-radius:7px;padding:6px 9px;line-height:1.45}
.typebar{display:flex;height:26px;border-radius:7px;overflow:hidden;margin-top:6px}
.typebar .seg{display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700}
.claim-legend{display:flex;gap:14px;font-size:11px;color:var(--cap);margin-top:6px}
.claim-legend .k{display:inline-flex;align-items:center;gap:5px}
.claim-legend .sw{width:11px;height:11px;border-radius:3px;display:inline-block}
.claim-tot{display:flex;gap:18px;padding:11px 14px;border-top:1px solid var(--border);background:var(--surf-hover);flex-wrap:wrap}
.claim-tot .b .l{font-size:10.5px;color:var(--cap)} .claim-tot .b .v{font-size:17px;font-weight:800;color:var(--text)}

/* 본부 그룹 탭 + 카드 */
.grptab{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.grptab .gb{font-size:12.5px;font-weight:700;color:var(--body);background:var(--white);border:1px solid var(--border);border-radius:999px;padding:7px 16px;cursor:pointer;display:flex;align-items:center;gap:7px}
.grptab .gb .c{width:9px;height:9px;border-radius:3px}
.grptab .gb.active{background:var(--emerald);border-color:var(--emerald);color:#fff}
.grptab .gb.active .c{background:#fff!important}
.divgroup{margin-bottom:18px}
.divgroup .gh{display:flex;align-items:center;gap:9px;margin:0 2px 11px}
.divgroup .gh .tag{font-size:11px;font-weight:800;border-radius:6px;padding:3px 10px}
.divgroup .gh .n{font-size:11.5px;color:var(--cap)}
.divs{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.dcard{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;flex-direction:column;gap:11px;cursor:pointer;transition:.12s;border-top:4px solid var(--navy)}
.dcard:hover{border-color:var(--emerald);transform:translateY(-2px);box-shadow:0 8px 22px rgba(16,39,31,.07)}
.dcard.t-sales{border-top-color:var(--emerald)}
.dcard.t-cost{border-top-color:var(--navy)}
.dcard.t-ops{border-top-color:var(--navy3)}
.dcard .top{display:flex;align-items:center;gap:10px}
.dcard .top .dico{width:36px;height:36px;border-radius:10px;background:var(--surf2);color:var(--text2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dcard.t-sales .top .dico{background:var(--emerald-soft);color:var(--emerald)}
.dcard.t-cost .top .dico{background:var(--navy5);color:var(--navy)}
.dcard.t-ops .top .dico{background:var(--surf2);color:var(--navy3)}
.dcard .top .nm{font-size:14.5px;font-weight:700;flex:1;color:var(--text)}
.dcard .mrow{font-size:12px;color:var(--cap)} .dcard .mrow b{color:var(--text2);font-weight:700}
.dcard .achv{margin-top:1px}
.dcard .achv .bar{height:7px;background:var(--surf2);border-radius:5px;overflow:hidden}

/* ================= CALC ================= */
const CONVERTIBLE=["가능","부분"];
function baseValue(k){if(!k.base)return null;if(k.base==="fundRate")return PARAMS.fundScale*PARAMS.fundRate;return PARAMS[k.base];}
function impact(k){if(!CONVERTIBLE.includes(k.money))return null;const b=baseValue(k);if(b==null||k.target==null||k.actual==null)return null;const sign=(k.st==="higher")?1:-1;return (k.actual-k.target)*b*sign;}
function signal(k){if(k.target==null||k.actual==null)return "none";
  if(k.st==="higher"){if(k.actual>=k.target)return "ok";if(k.actual>=k.target*0.85)return "warn";return "risk";}
  if(k.st==="lower"){if(k.actual<=k.target)return "ok";if(k.actual<=k.target*1.1)return "warn";return "risk";}
  if(k.actual<=k.target)return "ok";if(k.actual<=k.target+1)return "warn";return "risk";}
const SIGW={risk:3,warn:2,ok:1,none:0},SIGLAB={ok:"정상",warn:"주의",risk:"위험",none:"미입력"};
const STATELAB={ok:"순항",warn:"점검 필요",risk:"긴급",none:"미입력"};
function fmtA(v,d){if(v==null)return "–";d=d==null?1:d;return (v<0?"−":"")+Math.abs(v).toFixed(d)+"억";}
function dispVal(k,v){if(v==null)return "";return k.unit==="%"?(v*100).toFixed(v<0.1?2:1):v;}
function parseVal(k,raw){if(raw===""||raw==null)return null;const n=parseFloat(raw);if(isNaN(n))return null;return k.unit==="%"?n/100:n;}
function fmtDisp(k,v){if(v==null)return "–";if(k.unit==="%")return (v*100).toFixed(v<0.1?2:1)+"%";return v.toLocaleString()+(k.unit==="배"?"배":k.unit);}
function divStats(id){const ks=KPIS.filter(k=>k.div===id);let worst="ok";
  ks.forEach(k=>{const s=signal(k);if(SIGW[s]>SIGW[worst]&&s!=="none")worst=s;});
  if(ks.every(k=>signal(k)==="none"))worst="none";
  const net=ks.map(impact).filter(v=>v!=null).reduce((a,b)=>a+b,0);
  return {worst,net};}
function sigInline(s){return `<span class="sig ${s}"><span class="dot"></span>${SIGLAB[s]}</span>`;}
function sigPill(s){return `<span class="sig pill ${s}"><span class="dot"></span>${SIGLAB[s]}</span>`;}
function statePill(s){return `<span class="sig pill ${s}"><span class="dot"></span>${STATELAB[s]}</span>`;}
function tagBadge(t){if(t==="핵심")return '<span class="tagb core">핵심</span>';if(t==="특임")return '<span class="tagb spec">특임</span>';return '';}
function tagChip(t){if(t==="핵심")return '<span class="tg core">핵심</span>';if(t==="특임")return '<span class="tg spec">특임</span>';return '';}

  ["sales","cost","ops"].forEach(tp=>{

}

/* 지표별 진단 문구 (수치 없이 시그널 기반 진단만) */
function insProf(E,sig){
  if(sig==="risk") return "적자 상태로, 손실 축소가 가장 시급합니다.";
  if(sig==="ok")   return "목표를 넘겨 이익을 잘 쌓고 있습니다.";
  return "흑자는 유지하고 있으나 누계 목표에는 아직 미치지 못합니다.";
}
function insRev(E,sig){
  if(sig==="risk") return "매출이 목표에 미치지 못하고 있습니다.";
  if(sig==="ok")   return "목표를 초과해 매출이 앞서가고 있습니다.";
  return "매출이 목표 수준에 근접해 있습니다.";
}
function insM(E,sig){
  if(sig==="ok")   return "목표 이익률을 충족하고 있습니다.";
  if(sig==="risk") return "목표 이익률을 크게 밑돌아 수익성 점검이 시급합니다.";
  return "이익률이 목표보다 낮아 원가·비용 점검이 필요합니다.";
}
/* 카드 하단 한 줄 종합 */
function insSynthesis(revSig,mSig){
  const revOk=revSig==="ok", mOk=mSig==="ok";
  if(revOk && !mOk) return "많이 팔고는 있지만 충분히 남기지 못하고 있습니다. 원가·할인 구조 점검이 핵심입니다.";
  if(!revOk && mOk) return "남기는 구조는 갖췄으나 판매 규모 확대가 필요합니다.";
  if(revOk && mOk)  return "매출과 수익성이 모두 안정적입니다. 현재 흐름을 유지하세요.";
  return "매출과 수익성이 동시에 약해 수익 구조 개선이 시급합니다.";
}

/* 경쟁사 벤치마킹 블록 */
function benchBlock(){
  const mx=Math.max(...BENCH.cost.map(c=>c.v));
  const rows=BENCH.cost.map(c=>{
    const col=c.me?"var(--emerald)":"var(--navy3)";
    return `<div class="row ${c.me?'me':''}"><span class="nm">${c.nm}</span>
      <span class="track"><span class="fill" style="width:${(c.v/mx*100).toFixed(1)}%;background:${col}">${c.v.toFixed(1)}%</span></span></div>`;}).join("");
  const mini=BENCH.mini.map(m=>`<div class="mr"><span class="k">${m.k}</span><span class="v ${m.win?'win':''}">${m.me} <span style="color:var(--cap);font-weight:600">· ${m.ind}</span></span></div>`).join("");
  return `<div class="bench">
    <div class="bh">${ic(ICON.pct,16)}<h3>원가율(매출원가율) 비교</h3></div>
    <div class="bsub">${BENCH.period} · 낮을수록 우수 · 원가율=공시 재무제표 기준</div>
    <div class="cgrid">
      <div class="costchart">${rows}</div>
      <div class="mini">${mini}<div class="tiny muted" style="margin-top:8px">출처: DART 연결 분기보고서 · 사무용 가구 4사</div></div>
    </div></div>`;
}

/* 성과 공유 여력 블록 */
function shareBlock(E){
  /* 내부 로직(비노출): 영업이익 누계 기반 5구간 위치 산정 */
  const zones=[
    {l:"적자 구간",c:"#c2c6cc"},{l:"낮음",c:"#bfe0c2"},{l:"보통",c:"#7ac86f"},{l:"높음",c:"#34a853"},{l:"매우 높음",c:"#177a3a"}
  ];
  let zi; const p=E.profitCum;
  if(p<=0) zi=0; else if(p<10) zi=1; else if(p<30) zi=2; else if(p<60) zi=3; else zi=4;
  /* 구간 내 위치 + 전체 위치(%) */
  const segW=100/zones.length;
  const pos=(zi+0.5)*segW;
  const segs=zones.map(z=>`<div class="seg" style="background:${z.c}">${z.l}</div>`).join("");
  let stateText;
  if(zi===0) stateText=`현재는 <b>적자 구간</b>으로, 공유 가능한 성과 여력이 없습니다. 영업이익이 흑자로 돌아설수록 공유 여력이 생기기 시작합니다.`;
  else if(zi===1) stateText=`현재 수준은 <b>"낮음"</b> 구간입니다. 영업이익이 흑자로 전환된 초기 단계로, 이익이 증가할수록 성과 공유 여력이 점진적으로 확대됩니다.`;
  else if(zi===2) stateText=`현재 수준은 <b>"보통"</b> 구간입니다. 영업이익이 증가할수록 성과 공유 여력이 점진적으로 확대됩니다.`;
  else if(zi===3) stateText=`현재 수준은 <b>"높음"</b> 구간입니다. 수익성이 견조하여 구성원과 공유할 수 있는 여력이 넉넉합니다.`;
  else stateText=`현재 수준은 <b>"매우 높음"</b> 구간입니다. 수익성이 매우 우수하여 성과 공유 여력이 최대치에 가깝습니다.`;
  return `<div class="share">
    <div class="sh">회사의 수익성이 높아질수록 구성원과 공유할 수 있는 성과 여력도 함께 커집니다.</div>
    <div class="gauge-wrap">
      <div class="gaugebar">${segs}</div>
      <div class="pointer" style="left:${pos}%"><div class="bdg">현재 · ${zones[zi].l}</div><div class="pin"></div></div>
    </div>
    <div class="share-state">${stateText}</div>
    <div class="share-note">
      <p>경영성과금은 임금이 아닌 경영성과 배분금이며, 지급 여부와 수준은 매년 회사의 경영판단에 따라 결정됩니다.</p>
      <p>표시 수준은 최종 영업이익에 따라 달라지는 추정 예시이며, 특정 금액의 지급을 보장하지 않습니다.</p>
    </div></div>`;
}

/* 인당 기여가치 블록 */
function perHeadBlock(E){
  const v=E.profitCum/META.FTE; // 누계 영업이익 ÷ 인원 = 0.01억
  const target=1.0;             // 임의 목표
  const zones=[{l:"위험",c:"#f2b8bd"},{l:"주의",c:"#f3d9a3"},{l:"정상",c:"#b6e0b9"},{l:"우수",c:"#34a853"}];
  /* 목표 1.0억 기준 위치(%): 0~target → 0~75%, target↑ → 75~100% */
  let pos; if(v<=0) pos=2; else if(v<target) pos=(v/target)*75; else pos=Math.min(75+(v/target-1)*25,98);
  const segs=zones.map(z=>`<div class="z" style="background:${z.c}"></div>`).join("");
  let zlab; if(v<target*0.5) zlab="위험"; else if(v<target*0.85) zlab="주의"; else if(v<target) zlab="정상"; else zlab="우수";
  return `<div class="perhead">
    <div class="lead"><div class="l">인당 생산성 (1인당 영업이익 누계)</div>
      <div class="v">${v.toFixed(2)}<small>억</small></div></div>
    <div class="gw">
      <div class="phgauge">${segs}<div class="pt" style="left:${pos}%"><span class="phbdg">현재 · ${zlab}</span></div></div>
      <div class="phgauge-lb"><span>위험</span><span>주의</span><span>정상</span><span>우수</span></div>
    </div>
    <div class="note">현재 인당 영업이익은 <b>${v.toFixed(2)}억</b>으로 목표 <b>1.0억</b> 대비 <b>"${zlab}"</b> 구간입니다 <span class="realbadge">실적 실제</span> <span class="estbadge">목표 임의</span>. 적자 구간에서는 절대 수준보다 손실 축소 속도를 우선 봅니다.</div>
  </div>`;
}

/* ================= 본부 그룹 ================= */
let curGrpTab="all";
function renderDivGroups(){
  const tabs=[{id:"all",label:"전체",c:"var(--emerald)"},
    {id:"sales",label:TYPE.sales.label,c:"var(--emerald)"},
    {id:"cost",label:TYPE.cost.label,c:"var(--navy)"},
    {id:"ops",label:TYPE.ops.label,c:"var(--navy3)"}];
  document.getElementById("grpTab").innerHTML=tabs.map(t=>
    `<button class="gb ${t.id===curGrpTab?'active':''}" data-grp="${t.id}"><span class="c" style="background:${t.c}"></span>${t.label}</button>`).join("");
  document.querySelectorAll('[data-grp]').forEach(b=>b.onclick=()=>{curGrpTab=b.dataset.grp;renderDivGroups();});
  const showTypes = curGrpTab==="all"?["sales","cost","ops"]:[curGrpTab];
  let h="";
  showTypes.forEach(tp=>{
    const t=TYPE[tp];
    h+=`<div class="divgroup"><div class="gh"><span class="tagb ${t.tag==='core'?'core':'spec'}" style="${t.tag==='data'?'color:var(--navy);background:var(--navy5);border:1px solid var(--navy-border)':t.tag==='ops'?'color:var(--navy2);background:var(--surf2);border:1px solid var(--border)':''}">${t.label}</span></div>
      <div class="divs">${DIVS.filter(d=>d.type===tp).map(divCard).join("")}</div></div>`;
  });
  document.getElementById("divArea").innerHTML=h;
  document.querySelectorAll('[data-div]').forEach(el=>el.onclick=()=>openDiv(el.dataset.div));
}
function divCard(d){
  const st=divStats(d.id);
  const tagged=[];(TEAMS[d.id]||[]).forEach(t=>t.kpis.forEach(k=>{if(k.tag==="핵심"||k.tag==="특임")tagged.push(k);}));
  const chips=tagged.slice(0,3).map(k=>`<span class="chip">${tagChip(k.tag)}${k.name}</span>`).join("")||`<span class="tiny muted">등록 KPI 없음</span>`;
  /* 목표/실적/달성률 */
  let goalBlock;
  if(d.revCum!=null){const ach=d.revCum/d.revTarget;
    goalBlock=`<div class="mrow">매출 <b>${fmtA(d.revCum,1)}</b> / 연간목표 ${fmtA(d.revTarget,0)}</div>
      <div class="achv"><div class="bar"><div class="fill" style="width:${Math.min(ach*100,100)}%"></div></div>
      <div class="lb"><span>달성률</span><span><b style="color:var(--emerald-press)">${(ach*100).toFixed(1)}%</b></span></div></div>`;
  } else {
    goalBlock=`<div class="mrow tiny muted">매출 비귀속 본부 · 원가/효율로 기여</div>`;
  }
  const net=st.net;
  const impBlock=`<div class="imp">개선 여력 <b class="${Math.abs(net)<0.05?'zero':''}">${net<0?fmtA(Math.abs(net),1):fmtA(net,1)}</b></div>`;
  return `<div class="dcard t-${d.type}" data-div="${d.id}">
    <div class="top"><span class="dico">${ic(ICON[d.icon],19)}</span><span class="nm">${d.name}</span>${statePill(st.worst)}</div>
    ${goalBlock}
    ${impBlock}
    <div class="lever"><div class="h">핵심 레버 · 핵심/특임 과제</div>${chips}</div>
    <span class="go">우리 본부 보기 →</span></div>`;
}

/* ================= 영업 활동 종합 차트 ================= */
function salesBlock(){
  const S=SALES;
  let h=`<div class="minicharts">`;
  /* 1) 계약건수 막대 */
  h+=`<div class="mchart"><div class="t"><span>계약 건수 (월별)</span><span class="badge tiny muted">건</span></div>
    ${barMini(S.month,S.contractCnt,"var(--navy)","건")}</div>`;
  /* 2) 평균계약액 라인 */
  h+=`<div class="mchart"><div class="t"><span>평균 계약액 (월별)</span><span class="badge tiny muted">억</span></div>

    <div class="cm">평균 계약액이 감소하고 있습니다.</div></div>`;

}
function barMini(labels,vals,color,unit){
  const W=420,H=92,pl=8,pr=8,pt=14,pb=18,iw=W-pl-pr,ih=H-pt-pb;
  const mx=Math.max(...vals.filter(v=>v!=null),1)*1.2;const bw=Math.min(iw/labels.length*0.5,26);
  let s=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">`;
  labels.forEach((m,i)=>{const cx=pl+iw*(i+0.5)/labels.length;
    if(vals[i]!=null){const bh=vals[i]/mx*ih,top=pt+ih-bh;
      s+=`<rect x="${(cx-bw/2).toFixed(1)}" y="${top.toFixed(1)}" width="${bw}" height="${bh.toFixed(1)}" rx="3" fill="${color}"/>`;
      s+=`<text x="${cx.toFixed(1)}" y="${(top-3).toFixed(1)}" font-size="9.5" font-weight="700" fill="${color}" text-anchor="middle">${vals[i]}</text>`;}
    s+=`<text x="${cx.toFixed(1)}" y="${H-5}" font-size="9" fill="#869389" text-anchor="middle">${m}</text>`;});
  return s+`</svg>`;
}
function lineMini(labels,vals,color,unit){
  const W=420,H=92,pl=14,pr=14,pt=16,pb=18,iw=W-pl-pr,ih=H-pt-pb;
  const valid=vals.filter(v=>v!=null);const mx=Math.max(...valid)*1.15,mn=Math.min(...valid)*0.85;
  let pts=[],s=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">`;
  labels.forEach((m,i)=>{const cx=pl+iw*(i+0.5)/labels.length;
    if(vals[i]!=null){const cy=pt+ih-((vals[i]-mn)/(mx-mn))*ih;pts.push([cx,cy]);
      s+=`<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="3" fill="${color}"/><text x="${cx.toFixed(1)}" y="${(cy-6).toFixed(1)}" font-size="9" font-weight="700" fill="${color}" text-anchor="middle">${vals[i].toFixed(1)}</text>`;}
    s+=`<text x="${cx.toFixed(1)}" y="${H-5}" font-size="9" fill="#869389" text-anchor="middle">${m}</text>`;});
  if(pts.length>1)s+=`<polyline points="${pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ')}" fill="none" stroke="${color}" stroke-width="2"/>`;
  return s+`</svg>`;
}
function comboMini(labels,bars,line){
  const W=420,H=100,pl=14,pr=22,pt=16,pb=18,iw=W-pl-pr,ih=H-pt-pb;
  const mxB=Math.max(...bars)*1.3,bw=Math.min(iw/labels.length*0.42,22);
  let pts=[],s=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">`;
  labels.forEach((m,i)=>{const cx=pl+iw*(i+0.5)/labels.length;
    const bh=bars[i]/mxB*ih,top=pt+ih-bh;
    s+=`<rect x="${(cx-bw/2).toFixed(1)}" y="${top.toFixed(1)}" width="${bw}" height="${bh.toFixed(1)}" rx="3" fill="var(--navy4)"/>`;
    s+=`<text x="${cx.toFixed(1)}" y="${(top-3).toFixed(1)}" font-size="9" font-weight="700" fill="var(--navy2)" text-anchor="middle">${bars[i]}</text>`;
    const cy=pt+ih-(line[i]/100)*ih;pts.push([cx,cy]);
    s+=`<text x="${cx.toFixed(1)}" y="${H-5}" font-size="9" fill="#869389" text-anchor="middle">${m}</text>`;});
  s+=`<polyline points="${pts.map(p=>p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ')}" fill="none" stroke="var(--emerald)" stroke-width="2"/>`;
  pts.forEach((p,i)=>{s+=`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2.6" fill="var(--emerald)"/><text x="${p[0].toFixed(1)}" y="${(p[1]-6).toFixed(1)}" font-size="8.5" font-weight="700" fill="var(--emerald-press)" text-anchor="middle">${line[i]}%</text>`;});
  return s+`</svg>`;
}
function forecastMini(){
  const S=SALES,labels=["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];

/* 클레임 콤보 차트 */
function claimChart(){
  const W=460,H=190,pl=30,pr=30,pt=22,pb=24,iw=W-pl-pr,ih=H-pt-pb;
  const m=CLAIM.month,cnt=CLAIM.count,cost=CLAIM.cost;
  const maxC=Math.max(...cnt.filter(v=>v!=null),1)*1.15,maxK=Math.max(...cost.filter(v=>v!=null),0.1)*1.28;
  const bw=Math.min(iw/m.length*0.46,30);
  let svg=`<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet" style="display:block;max-height:200px">`;
  for(let g=0;g<=2;g++){const y=pt+ih*g/2;svg+=`<line x1="${pl}" y1="${y.toFixed(1)}" x2="${W-pr}" y2="${y.toFixed(1)}" stroke="#eef0f2"/>`;}
  m.forEach((mm,i)=>{const cx=pl+iw*(i+0.5)/m.length;
    if(cnt[i]!=null){const bh=cnt[i]/maxC*ih;const top=pt+ih-bh;
      svg+=`<rect x="${(cx-bw/2).toFixed(1)}" y="${top.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="3" fill="var(--navy)"/>`;
      svg+=`<text x="${cx.toFixed(1)}" y="${(top-5).toFixed(1)}" font-size="10" font-weight="700" fill="var(--navy2)" text-anchor="middle">${cnt[i]}</text>`;}
    svg+=`<text x="${cx.toFixed(1)}" y="${H-7}" font-size="10" fill="#869389" text-anchor="middle">${mm}</text>`;});
  let pts=[],lbl="";
  m.forEach((mm,i)=>{if(cost[i]!=null){const cx=pl+iw*(i+0.5)/m.length;const cy=pt+ih-(cost[i]/maxK*ih);pts.push([cx,cy]);
    const ly=Math.min(cy+14,pt+ih+11);
    lbl+=`<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="3.5" fill="var(--risk)"/><text x="${cx.toFixed(1)}" y="${ly.toFixed(1)}" font-size="10" font-weight="700" fill="var(--risk-ink)" text-anchor="middle" style="paint-order:stroke" stroke="#ffffff" stroke-width="3">${cost[i].toFixed(2)}</text>`;}});
  if(pts.length>1)svg+=`<polyline points="${pts.map(p=>p[0].toFixed(1)+","+p[1].toFixed(1)).join(" ")}" fill="none" stroke="var(--risk)" stroke-width="2.2"/>`;
  return svg+lbl+`</svg>`;
}

function gauge(k){const s=signal(k),col=s==="ok"?"var(--ok)":(s==="warn"?"var(--warn)":"var(--risk)");
  if(k.st==="count"){return `<div class="gline">목표 ${k.target}${k.unit} · 현재 <b style="color:${col}">${k.actual==null?'–':k.actual+k.unit}</b>${k.actual!=null&&k.actual>k.target?` · 초과 ${k.actual-k.target}${k.unit}`:''}</div>`;}
  if(k.target==null||k.actual==null)return `<div class="gline muted">목표/실적 입력 시 표시</div>`;
  const ratio=k.st==="higher"?(k.target?k.actual/k.target:0):(k.actual?k.target/k.actual:1);
  const max=1.3,fillPct=Math.max(0,Math.min(ratio,max))/max*100,tgtPct=(1/max)*100;
  const gap=k.st==="higher"?(k.target-k.actual):(k.actual-k.target);const gapTxt=gap>0?`부족분 ${fmtDisp(k,Math.abs(gap))}`:"목표 도달";
  return `<div class="gauge"><div class="bar"><div class="fill" style="width:${fillPct}%;background:${col}"></div><div class="tgt" style="left:${tgtPct}%"></div></div>
    <div class="lb"><span>현재 <b>${fmtDisp(k,k.actual)}</b> · 달성률 ${(ratio*100).toFixed(0)}%</span><span>${gapTxt}</span></div></div>`;}

    `매출 누계 ${fmtA(EXEC.revenueCum,1)} · 누계 목표 ${fmtA(EXEC.revenueCumTarget,1)} (달성률 ${(EXEC.revAchCum*100).toFixed(1)}%)`,
    `${META.baseMonth}월 매출 ${fmtA(EXEC.revenueMonth,1)} · 목표 ${fmtA(EXEC.revenueMonthTarget,1)} (${((EXEC.revAchMonth-1)*100).toFixed(1)}%)`,
    `당월 영업이익률 ${(EXEC.opMarginMonth*100).toFixed(2)}% · 목표 영업이익률 ${(EXEC.opMarginCumTarget*100).toFixed(1)}%`,
    `위험(RED) KPI ${EXEC.riskCount}개`,
    `경쟁사 벤치마킹 — 2026 1분기 DART 연결 기준`,
    `클레임 현황 2~4월 (176 / 191 / 99건)`,
    `본부 매출 누계 (세일즈마케팅1본부 165.04억 / 2본부 92.16억)`,
    `재료비율 44.84% (목표 40%)`
  ];
  const est=[
    `영업이익 누계 목표 ${fmtA(EXEC.profitCumTarget,2)} — 시트에 값 없음(가정치)`,
    `영업 활동(계약 건수·평균 계약액) — 예시값`,
    `인당생산성·비용 적정성의 공헌이익·비용 — 미입력`
  ];
  document.getElementById("logBody").innerHTML=`
    <div class="logsec">
      <div class="logh">데이터 기준</div>
      <div class="logkv"><span>데이터 갱신일</span><b>${META.lastUpdated}</b></div>
      <div class="logkv"><span>기준월</span><b>2026년 ${META.baseMonth}월</b></div>
      <div class="logkv"><span>데이터 출처</span><b>회계IR 보고서 · 취합용 KPI 가이드</b></div>
      <div class="logkv"><span>현재 조회 시각</span><b>${ts}</b></div>
    </div>
    <div class="logsec">
      <div class="logh">실제값 <span class="realbadge">시트 확정</span></div>
      <ul class="loglist">${real.map(x=>`<li>${x}</li>`).join("")}</ul>
    </div>
    <div class="logsec">
      <div class="logh">확인 필요 값 <span class="estbadge">임의 · 미입력</span></div>
      <ul class="loglist est">${est.map(x=>`<li>${x}</li>`).join("")}</ul>
      <div class="lognote">위 값은 회계·생산·인사·자금 부서 확인 후 확정 예정입니다.</div>
    </div>`;
  document.getElementById("logModal").classList.add("on");}

/* ================= ROUTING ================= */
function showView(v){document.getElementById("view-corp").classList.toggle("hidden",v!=="corp");
  document.getElementById("view-div").classList.toggle("hidden",v!=="div");
  document.getElementById("view-l2").classList.toggle("hidden",v!=="l2");
  if(v==="corp")renderCorp();renderSidebar(v);}
function goHome(){showView("corp");window.scrollTo(0,0);closeMobile();}
function isMobile(){try{if(window.matchMedia)return window.matchMedia("(max-width:1000px)").matches;}catch(e){}return (window.innerWidth||1200)<=1000;}
function closeMobile(){if(isMobile()){document.getElementById("app").classList.remove("sbshow");document.getElementById("backdrop").classList.remove("on");}}
function toggleSidebar(){
  const app=document.getElementById("app"),bd=document.getElementById("backdrop");
  if(isMobile()){const on=app.classList.toggle("sbshow");bd.classList.toggle("on",on);}
  else{app.classList.toggle("sbhide");}
}

/* ================= INIT ================= */
function startApp(){
  document.getElementById("login").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  document.getElementById("bm").textContent=META.baseMonth+"월";
  document.getElementById("updBtn").textContent=META.lastUpdated;
  document.getElementById("logoHome").onclick=goHome;
  document.getElementById("titleHome").onclick=goHome;
  document.getElementById("burger").onclick=toggleSidebar;
  document.getElementById("backdrop").onclick=closeMobile;
  document.getElementById("updBtn").onclick=openLog;
  document.getElementById("logClose").onclick=()=>document.getElementById("logModal").classList.remove("on");
  document.getElementById("logModal").onclick=e=>{if(e.target.id==="logModal")document.getElementById("logModal").classList.remove("on");};
  document.getElementById("logoutBtn").onclick=doLogout;
  if(isMobile())document.getElementById("app").classList.remove("sbshow");
  goHome();
}
function doLogout(){
  document.getElementById("app").classList.add("hidden");
  document.getElementById("login").classList.remove("hidden");
  document.getElementById("lpw").value="";
  document.getElementById("loginErr").textContent="";
}
function tryLogin(){
  const id=document.getElementById("lid").value.trim();
  const pw=document.getElementById("lpw").value;
  if((id==="koas"&&pw==="koas2026")||(id&&pw)){ // 데모: 지정 계정 또는 비어있지 않은 입력 허용
    startApp();
  } else {
    document.getElementById("loginErr").textContent="아이디와 비밀번호를 입력해 주세요.";
  }
}
(function initLogin(){
  document.getElementById("loginBtn").onclick=tryLogin;
  ["lid","lpw"].forEach(id=>document.getElementById(id).addEventListener("keydown",e=>{if(e.key==="Enter")tryLogin();}));
  document.getElementById("lid").focus();
  window.addEventListener("resize",()=>{ // 데스크탑 복귀 시 모바일 오버레이 정리
    if(!isMobile()){document.getElementById("app").classList.remove("sbshow");document.getElementById("backdrop").classList.remove("on");}
  });
})();

</script>
