<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOAS KPI 경영 대시보드</title>
<style>
/* ============================================================
   KOAS KPI 대시보드
   회사색(구조 전용): Primary #F78F1E / White #FFFFFF / Brand-green #7AC141
   ── 주황은 '신호등'에 절대 쓰지 않음(브랜드/구조 전용)
   신호등(상태 전용, 항상 텍스트 병기):
     정상 #7AC141 · 주의 #E6B400 · 위험 #D93025
   Neutral: bg #F6F7F9 / card #FFF / border #E6E8EC / muted #6B7280 / text #2B2F36
============================================================ */
:root{
  --brand:#F78F1E; --brand-soft:#FFF3E6; --brand-line:#F6DCB9; --brand-ink:#9a5a07;
  --green:#7AC141; --green-soft:#EEF7E5;
  --ok:#5FA52E; --ok-soft:#EAF6E0;
  --warn:#E6B400; --warn-ink:#9a7a00; --warn-soft:#FBF3D6;
  --danger:#D93025; --danger-soft:#FBE7E5;
  --bg:#F6F7F9; --card:#FFFFFF; --border:#E6E8EC; --muted:#6B7280; --text:#2B2F36;
  --sb:#1F232B; --sb-soft:#2A2F38; --sb-line:#343a44; --sb-mut:#9aa1ac;
  --radius:12px;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  background:var(--bg); color:var(--text);
  font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic","Segoe UI",sans-serif;
  font-size:14px; line-height:1.55; -webkit-font-smoothing:antialiased;
  font-variant-numeric:tabular-nums;
}
h1,h2,h3,h4{margin:0;font-weight:700;letter-spacing:-.3px}
.muted{color:var(--muted)} .tiny{font-size:11.5px}
button{font-family:inherit;cursor:pointer}
svg.ic{display:block}

/* ================= LAYOUT ================= */
.app{display:flex;min-height:100vh}

/* ---- Sidebar ---- */
.sidebar{width:248px;flex-shrink:0;background:var(--sb);color:#fff;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.sb-logo{display:flex;align-items:center;gap:11px;padding:18px 18px 14px;cursor:pointer}
.sb-logo .mark{width:34px;height:34px;border-radius:9px;background:var(--brand);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:15px;flex-shrink:0}
.sb-logo b{font-size:15px;display:block;letter-spacing:-.2px}
.sb-logo span{font-size:11px;color:var(--sb-mut)}
.sb-tag{margin:0 14px 12px;background:var(--sb-soft);border:1px solid var(--sb-line);border-radius:9px;padding:9px 11px}
.sb-tag .t{font-size:11.5px;color:#e7c9a3;font-weight:700}
.sb-tag .d{font-size:10.5px;color:var(--sb-mut);margin-top:2px}
.sb-nav{flex:1;overflow-y:auto;padding:4px 10px 10px}
.sb-grp{font-size:10px;font-weight:700;letter-spacing:.4px;color:var(--sb-mut);text-transform:uppercase;padding:14px 8px 6px}
.sb-item{display:flex;align-items:center;gap:10px;width:100%;padding:8px 10px;border:none;background:none;color:#cfd4db;border-radius:8px;font-size:13px;text-align:left;margin-bottom:2px;transition:.12s}
.sb-item:hover{background:var(--sb-soft);color:#fff}
.sb-item.active{background:var(--brand);color:#fff;font-weight:600}
.sb-item .ic{flex-shrink:0}
.sb-item .lbl{flex:1}
.sb-item .dotsig{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sb-foot{padding:12px 14px;border-top:1px solid var(--sb-line)}
.sb-demo{font-size:10.5px;color:#caa06a;background:rgba(247,143,30,.12);border:1px dashed rgba(247,143,30,.5);border-radius:7px;padding:7px 9px;line-height:1.4}

/* ---- Main ---- */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:flex-end;gap:16px;padding:22px 30px 16px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20}
.topbar .ttl{cursor:pointer}
.topbar .ttl h1{font-size:25px;line-height:1.15}
.topbar .ttl .sub{font-size:13px;color:var(--brand-ink);margin-top:4px;font-weight:600}
.topbar .sp{flex:1}
.topbar .meta{font-size:11.5px;color:var(--muted);text-align:right;line-height:1.6}
.topbar .meta b{color:var(--text)}
.content{padding:22px 30px 70px;max-width:1180px}

/* ---- Section title ---- */
.sec{display:flex;align-items:baseline;gap:10px;margin:26px 2px 14px}
.sec:first-child{margin-top:4px}
.sec .bar{width:4px;height:18px;background:var(--brand);border-radius:2px;align-self:center}
.sec h2{font-size:16px}
.sec .s{font-size:12px;color:var(--muted);font-weight:400}

/* ---- Signal (상태 전용) ---- */
.sig{display:inline-flex;align-items:center;gap:6px;font-weight:700;white-space:nowrap;font-size:12px}
.sig .dot{width:9px;height:9px;border-radius:50%}
.sig.ok{color:var(--ok)} .sig.ok .dot{background:var(--ok)}
.sig.warn{color:var(--warn-ink)} .sig.warn .dot{background:var(--warn)}
.sig.risk{color:var(--danger)} .sig.risk .dot{background:var(--danger)}
.sig.none{color:var(--muted)} .sig.none .dot{background:#c2c6cc}
.sig.pill{padding:3px 11px;border-radius:999px}
.sig.pill.ok{background:var(--ok-soft)} .sig.pill.warn{background:var(--warn-soft)}
.sig.pill.risk{background:var(--danger-soft)} .sig.pill.none{background:#eef0f2}

/* ---- Badges ---- */
.estbadge{font-size:10px;font-weight:700;color:var(--brand-ink);background:var(--brand-soft);border:1px dashed var(--brand-line);border-radius:5px;padding:1px 6px}
.realbadge{font-size:10px;font-weight:700;color:#3a6e16;background:var(--green-soft);border:1px solid #cfe6b6;border-radius:5px;padding:1px 6px}

/* ---- Exec cards ---- */
.exec{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.kc{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;flex-direction:column;gap:4px}
.kc .hd{display:flex;align-items:center;justify-content:space-between;gap:8px}
.kc .hd .lab{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted)}
.kc .hd .ico{width:30px;height:30px;border-radius:8px;background:var(--brand-soft);color:var(--brand);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.kc .val{font-size:27px;font-weight:800;letter-spacing:-.6px;margin-top:4px}
.kc .val small{font-size:13px;font-weight:600;color:var(--muted)}
.kc .meta{font-size:11.5px;color:var(--muted)}
.dn{color:var(--danger);font-weight:700} .up{color:var(--ok);font-weight:700}

/* competitor mini-card */
.cmp{grid-column:span 1}
.cmp .rowc{display:flex;align-items:center;gap:8px;font-size:11.5px;margin-top:7px}
.cmp .rowc .lb{width:48px;color:var(--muted);flex-shrink:0}
.cmp .rowc .me{font-weight:800;width:54px;text-align:right}
.cmp .rowc .bars{flex:1;display:flex;gap:3px;align-items:flex-end;height:26px}
.cmp .rowc .bars .b{flex:1;border-radius:3px 3px 0 0;min-height:3px}

/* ---- Demand source table ---- */
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:4px 2px}
table.dt{border-collapse:collapse;width:100%;font-size:12.5px}
.dt th,.dt td{padding:10px 14px;border-bottom:1px solid var(--border);text-align:left}
.dt th{font-size:11px;color:var(--muted);font-weight:700;background:#fafbfc}
.dt td.n,.dt th.n{text-align:right;font-variant-numeric:tabular-nums}
.dt tr:last-child td{border-bottom:none}
.dt tr.sum td{font-weight:800;background:#fafbfc}
.minib{display:inline-flex;gap:2px;align-items:flex-end;height:20px;vertical-align:middle}
.minib i{width:5px;background:var(--brand);border-radius:2px 2px 0 0;display:inline-block;min-height:2px}

/* ---- Claim chart card ---- */
.claim{display:grid;grid-template-columns:1.55fr 1fr;gap:14px}
.claim .chartcard,.claim .sidecard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.claim .legend{display:flex;gap:16px;font-size:11.5px;color:var(--muted);margin-top:8px}
.claim .legend .k{display:inline-flex;align-items:center;gap:6px}
.claim .legend .sw{width:12px;height:12px;border-radius:3px;display:inline-block}
.claim .sidecard .big{font-size:26px;font-weight:800}
.claim .sidecard .sub{font-size:11.5px;color:var(--muted)}
.claim .sidecard .divider{height:1px;background:var(--border);margin:13px 0}

/* ---- Division cards ---- */
.divs{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.dcard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;flex-direction:column;gap:11px;cursor:pointer;transition:.12s}
.dcard:hover{border-color:var(--brand);transform:translateY(-1px);box-shadow:0 6px 18px rgba(20,20,30,.05)}
.dcard.lead{border-color:var(--brand);border-width:1.5px}
.dcard .top{display:flex;align-items:center;gap:10px}
.dcard .top .dico{width:36px;height:36px;border-radius:9px;background:var(--brand-soft);color:var(--brand);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dcard .top .nm{font-size:14.5px;font-weight:700;flex:1}
.dcard .rev{font-size:12px;color:var(--muted)}
.dcard .rev b{color:var(--text);font-weight:700}
.dcard .loss{font-size:12px;color:var(--muted)}
.dcard .loss b{font-size:17px;color:var(--danger);display:block;font-weight:800}
.dcard .loss b.zero{color:var(--ok)}
.dcard .rk .h{font-size:11px;color:var(--muted);margin-bottom:4px}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;background:var(--danger-soft);color:var(--danger);border-radius:6px;padding:2px 8px;margin:2px 4px 2px 0}
.chip.w{background:var(--warn-soft);color:var(--warn-ink)}
.chip .d{width:6px;height:6px;border-radius:50%;background:currentColor}
.dcard .go{margin-top:2px;align-self:flex-start;font-size:12px;font-weight:700;color:var(--brand-ink);background:var(--brand-soft);border:1px solid var(--brand-line);border-radius:8px;padding:6px 12px}

/* ---- Loss Top3 ---- */
.lpan{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;display:flex;gap:20px;flex-wrap:wrap}
.lpan .sum{flex:0 0 200px;background:var(--danger-soft);border-radius:10px;padding:14px}
.lpan .sum .l{font-size:12px;color:#8a3024}
.lpan .sum .v{font-size:25px;font-weight:800;color:var(--danger)}
.lpan .sum .n{display:inline-block;margin-top:6px;font-size:10.5px}
.lpan .lst{flex:1;min-width:240px}
.lpan .row{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--border)}
.lpan .row:last-child{border:none}
.rank{width:22px;height:22px;border-radius:6px;background:var(--danger);color:#fff;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lpan .nm{flex:1;font-size:13px} .lpan .nm small{display:block;color:var(--muted);font-size:11px}
.lpan .amt{font-weight:800;color:var(--danger)}

/* ---- Division detail ---- */
.ddtop{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.ddtop .crumb{display:flex;align-items:center;gap:8px;font-size:13px}
.ddtop .crumb a{color:var(--brand);font-weight:700;cursor:pointer}
.ddtop .crumb .sepc{color:var(--muted)}
.ddtop .sp{flex:1}
.ddsel{font-size:12.5px;font-weight:600;color:var(--text);background:var(--card);border:1px solid var(--border);border-radius:8px;padding:7px 11px}
.ddsel:focus{outline:none;border-color:var(--brand)}
.ddhead{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;display:flex;gap:28px;flex-wrap:wrap;align-items:center}
.ddhead .blk .l{font-size:11.5px;color:var(--muted)}
.ddhead .blk .v{font-size:22px;font-weight:800;margin-top:2px}
.ddhead .blk .v.loss{color:var(--danger)}
.ddhead .rk{flex:1;min-width:200px}
.ddhead .rk .l{font-size:11.5px;color:var(--muted);margin-bottom:5px}

/* tasks 한 문장형 */
.tasks{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.task{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:15px 16px;border-left:3px solid var(--brand)}
.task .ttl{font-weight:700;font-size:14px;margin-bottom:7px;display:flex;align-items:center;gap:8px}
.task .ttl .tg{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;background:var(--brand-soft);color:var(--brand-ink)}
.task .sentence{font-size:13px;color:var(--text);line-height:1.6}
.task .sentence .act{background:var(--brand-soft);color:var(--brand-ink);font-weight:700;padding:1px 6px;border-radius:5px;box-decoration-break:clone;-webkit-box-decoration-break:clone}
.task .owner{display:inline-block;margin-top:9px;font-size:11px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:2px 9px;color:var(--muted)}

/* related kpi */
.grp{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
.gbtn{font-size:12.5px;font-weight:600;color:var(--text);background:var(--card);border:1px solid var(--border);border-radius:999px;padding:6px 15px;cursor:pointer}
.gbtn.active{background:var(--brand);border-color:var(--brand);color:#fff}
.krow{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px 15px;margin-bottom:10px;display:grid;grid-template-columns:1.5fr 1.3fr auto;gap:14px;align-items:center}
.krow .nm{font-weight:700;font-size:13.5px;display:flex;align-items:center;gap:8px}
.krow .df{font-size:11px;color:var(--muted)}
.krow .edit{display:flex;gap:12px}
.krow .f{display:flex;flex-direction:column;gap:2px}
.krow .f label{font-size:10px;color:var(--muted)}
.krow .ig{display:flex;align-items:center;gap:3px}
.krow input{width:62px;padding:5px 7px;border:1px solid var(--border);border-radius:7px;font:inherit;font-size:12.5px;text-align:right}
.krow input.tgt{border-style:dashed}
.krow .u{font-size:11px;color:var(--muted)}
.krow .right{text-align:right;min-width:148px}
.krow .imp{font-size:11.5px;color:var(--muted);margin-top:5px}
.krow .imp b{color:var(--danger)}
.gauge{margin-top:8px}
.gauge .bar{position:relative;height:9px;background:#EEF0F2;border-radius:6px}
.gauge .fill{position:absolute;left:0;top:0;bottom:0;border-radius:6px}
.gauge .tgt{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--text)}
.gauge .tgt::after{content:"목표";position:absolute;top:-15px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--muted);white-space:nowrap}
.gauge .lb{display:flex;justify-content:space-between;font-size:10.5px;color:var(--muted);margin-top:9px}
.gauge .lb b{color:var(--text)}
.gline{font-size:12px;color:var(--muted)}

/* cascade */
.castog{font-size:12.5px;font-weight:600;color:var(--brand-ink);background:var(--brand-soft);border:1px solid var(--brand-line);border-radius:8px;padding:8px 14px;width:100%;text-align:left}
.casbody{display:none;margin-top:12px}
.casbody.open{display:block}
.caschain{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px}
.casnode{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 11px;font-size:12px;max-width:160px}
.casnode .lvl{font-size:9.5px;color:var(--muted);text-transform:uppercase;display:block}
.casnode.act{border-color:var(--brand);background:var(--brand-soft)}
.casarr{color:var(--brand);font-weight:700}

/* layer2 */
.l2warn{background:var(--danger-soft);border:1px solid #f0bcb6;border-radius:10px;padding:13px 16px;margin-bottom:16px;display:flex;gap:9px;align-items:center;flex-wrap:wrap;font-size:12.5px;color:#8a3024}
.l2warn b{color:var(--danger)} .l2warn .c{background:#fff;border:1px solid #f0bcb6;color:#8a3024;border-radius:999px;padding:2px 10px;font-size:11px;font-weight:700}
table.t2{border-collapse:collapse;width:100%;font-size:12.5px;background:var(--card);border-radius:var(--radius);overflow:hidden}
.t2 th,.t2 td{padding:10px 12px;border-bottom:1px solid var(--border);text-align:left}
.t2 th{background:#fafbfc;font-size:11.5px;color:#444;font-weight:700}
.t2 td.n,.t2 th.n{text-align:right;font-variant-numeric:tabular-nums}
.neg{color:var(--danger);font-weight:700} .pos{color:var(--ok);font-weight:700}
.gatec{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:12px}
.gatec .bx{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:13px}
.gatec .bx .l{font-size:11.5px;color:var(--muted)} .gatec .bx .v{font-size:20px;font-weight:800;margin-top:4px}
.gatec input{width:90px;padding:5px 7px;border:1px solid var(--border);border-radius:7px;font:inherit;text-align:right}

.hidden{display:none!important}
footer{font-size:11px;color:#9aa0a6;text-align:center;padding-top:22px}
@media (max-width:1000px){
  .sidebar{display:none}
  .exec{grid-template-columns:repeat(2,1fr)} .divs{grid-template-columns:1fr}
  .claim{grid-template-columns:1fr} .tasks{grid-template-columns:1fr}
  .krow{grid-template-columns:1fr;gap:10px} .krow .right{text-align:left}
  .content{padding:18px}
}
</style>
</head>
<body>
<div class="app">

  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar">
    <div class="sb-logo" id="logoHome">
      <div class="mark">K</div>
      <div><b>KOAS KPI</b><span>경영 대시보드</span></div>
    </div>
    <div class="sb-tag">
      <div class="t">전사 목표는 현장의 실행으로</div>
      <div class="d">현장 실행 → 본부 → 전사로 합산됩니다</div>
    </div>
    <nav class="sb-nav" id="sbNav"></nav>
    <div class="sb-foot">
      <div class="sb-demo">검증용 임시 빌드 · 일부 숫자 비확정<br>실제 데이터는 시트값, 빈 칸은 임의값</div>
    </div>
  </aside>

  <!-- ============ MAIN ============ -->
  <div class="main">
    <div class="topbar">
      <div class="ttl" id="titleHome">
        <h1>KOAS KPI 경영 대시보드</h1>
        <div class="sub">전사 목표는 현장의 실행으로 완성됩니다.</div>
      </div>
      <div class="sp"></div>
      <div class="meta">기준월 <b id="bm"></b> · 단위 <b>억 원</b><br>갱신일 <span id="upd"></span></div>
    </div>

    <div class="content">
      <!-- VIEW: 전사 -->
      <div id="view-corp"></div>
      <!-- VIEW: 본부 -->
      <div id="view-div" class="hidden"></div>
      <!-- VIEW: 비용 적정성 -->
      <div id="view-l2" class="hidden"></div>
      <footer>검증용 단일 HTML · 외부 라이브러리 없음 · 실제값=시트 / 임의값=가정 · 인쇄 가능</footer>
    </div>
  </div>
</div>

<script>
/* =====================================================================
   ICONS (inline svg, 외부 라이브러리 없음)
===================================================================== */
function ic(p,sz){sz=sz||18;return `<svg class="ic" width="${sz}" height="${sz}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;}
const ICON={
  home:'<path d="M3 11l9-8 9 8M5 10v10h14V10"/>',
  profit:'<path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/>',
  revenue:'<path d="M12 1v22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>',
  pct:'<circle cx="7" cy="7" r="3"/><circle cx="17" cy="17" r="3"/><path d="M19 5 5 19"/>',

/* =====================================================================
   CALC ENGINE
===================================================================== */
const CONVERTIBLE=["가능","부분"];
function baseValue(k){ if(!k.base) return null;
  if(k.base==="fundRate") return PARAMS.fundScale*PARAMS.fundRate;
  return PARAMS[k.base]; }
function impact(k){
  if(!CONVERTIBLE.includes(k.money)) return null;
  const b=baseValue(k); if(b==null||k.target==null||k.actual==null) return null;
  const sign=(k.st==="higher")?1:-1;
  return (k.actual-k.target)*b*sign;
}
function signal(k){
  if(k.target==null||k.actual==null) return "none";
  if(k.st==="higher"){ if(k.actual>=k.target) return "ok"; if(k.actual>=k.target*0.85) return "warn"; return "risk"; }
  if(k.st==="lower"){ if(k.actual<=k.target) return "ok"; if(k.actual<=k.target*1.1) return "warn"; return "risk"; }
  if(k.actual<=k.target) return "ok"; if(k.actual<=k.target+1) return "warn"; return "risk";
}
const SIGW={risk:3,warn:2,ok:1,none:0}, SIGLAB={ok:"정상",warn:"주의",risk:"위험",none:"미입력"};
function fmtA(v,d){ if(v==null) return "–"; d=d==null?1:d; return (v<0?"−":"")+Math.abs(v).toFixed(d)+"억"; }
function dispVal(k,v){ if(v==null) return ""; return k.unit==="%"?(v*100).toFixed(v<0.1?2:1):v; }
function parseVal(k,raw){ if(raw===""||raw==null) return null; const n=parseFloat(raw); if(isNaN(n)) return null; return k.unit==="%"?n/100:n; }
function fmtDisp(k,v){ if(v==null) return "–"; if(k.unit==="%") return (v*100).toFixed(v<0.1?2:1)+"%"; return v.toLocaleString()+(k.unit==="배"?"배":k.unit); }
function divStats(id){
  const ks=KPIS.filter(k=>k.div===id); let worst="ok";
  ks.forEach(k=>{const s=signal(k); if(SIGW[s]>SIGW[worst]&&s!=="none") worst=s;});
  if(ks.every(k=>signal(k)==="none")) worst="none";
  const loss=ks.map(impact).filter(v=>v!=null&&v<0).reduce((a,b)=>a+b,0);
  const riskKs=ks.filter(k=>{const s=signal(k);return s==="risk"||s==="warn";})
    .sort((a,b)=>{const ia=impact(a)??0,ib=impact(b)??0;return ia-ib;});
  return {worst,loss,riskKs};
}
function sigInline(s){return `<span class="sig ${s}"><span class="dot"></span>${SIGLAB[s]}</span>`;}
function sigPill(s){return `<span class="sig pill ${s}"><span class="dot"></span>${SIGLAB[s]}</span>`;}

function bars(vals,colorFn,h){ h=h||26; const mx=Math.max(...vals.filter(v=>v!=null),1);
  return vals.map(v=>{const ht=v==null?0:Math.max(v/mx*h,2);return `<span class="b" style="height:${ht}px;background:${colorFn(v)}"></span>`;}).join(""); }

function renderCorp(){
  const E=EXEC, ach=E.revenueCum/E.revenueCumTarget;
  const revSig = ach>=1?"ok":(ach>=0.95?"warn":"risk");
  const profSig = E.opProfitMonth<0?"risk":(E.opProfitCum>0?"warn":"risk");
  const mSig = E.opMargin>=E.opMarginTarget?"ok":(E.opMargin>=0?"warn":"risk");

  /* 경쟁사 미니 막대 */
  const cmpRows=CMP.rows.map(r=>{
    const set=[{lab:"당사",v:r.me,me:true},{lab:"A",v:r.A},{lab:"B",v:r.B},{lab:"평균",v:r.ind}];
    const mx=Math.max(...set.map(s=>Math.abs(s.v)),1);

      <div class="meta">당월 <span class="dn">${fmtA(E.opProfitMonth,2)}</span> · 적자월 · ${sigInline(profSig)}</div></div>

      <div class="val">${fmtA(E.revenueCum,0)}</div>
      <div class="meta">누계목표 ${fmtA(E.revenueCumTarget,0)} · 달성률 <span class="up">${(ach*100).toFixed(1)}%</span> · ${sigInline(revSig)}</div></div>

    <div class="kc"><div class="hd"><span class="lab">${ic(ICON.pct,15)} 영업이익률 <span class="realbadge">실제</span></span><span class="ico">${ic(ICON.pct,17)}</span></div>
      <div class="val">${(E.opMargin*100).toFixed(1)}<small>%</small></div>
      <div class="meta">목표 ${(E.opMarginTarget*100).toFixed(1)}% · 누계 ${(E.opMarginCum*100).toFixed(2)}% · ${sigInline(mSig)}</div></div>

    <div class="kc cmp"><div class="hd"><span class="lab">${ic(ICON.vs,15)} 경쟁사 벤치마킹 <span class="estbadge">경쟁사·평균 임의</span></span><span class="ico">${ic(ICON.vs,17)}</span></div>
      ${cmpRows}

  /* 본부 현황 */
  h+=`<div class="sec"><span class="bar"></span><h2>본부 KPI</h2><span class="s">— 우리 본부 클릭 → 본부 상세(행동 중심)</span></div><div class="divs" id="divCards"></div>`;

  /* 손실 Top3 */
  h+=`<div class="sec"><span class="bar"></span><h2>손실 Top 3</h2><span class="s">— 환산 가능 KPI만 집계 · 누계 기준 추정</span></div>

  document.getElementById("divCards").innerHTML=DIVS.map(d=>{
    const st=divStats(d.id);
    const lead=(worst&&worst.d.id===d.id&&st.worst==="risk")?"lead":"";
    const chips=st.riskKs.slice(0,2).map(k=>{const s=signal(k);return `<span class="chip ${s==='warn'?'w':''}"><span class="d"></span>${k.name}</span>`;}).join("")||`<span class="tiny muted">위험 KPI 없음</span>`;
    const rev=d.revCum!=null?`<div class="rev">매출 누계 <b>${fmtA(d.revCum,1)}</b> / 목표 ${fmtA(d.revTarget,0)}</div>`:`<div class="rev tiny muted">매출 비귀속 본부</div>`;
    return `<div class="dcard ${lead}" data-div="${d.id}">
      <div class="top"><span class="dico">${ic(ICON[d.icon],19)}</span><span class="nm">${d.name}</span>${sigPill(st.worst)}</div>

  document.querySelectorAll('[data-div]').forEach(el=>el.onclick=()=>openDiv(el.dataset.div));

  /* 손실 Top3 */
  const losses=KPIS.map(k=>({k,imp:impact(k)})).filter(x=>x.imp!=null&&x.imp<0).sort((a,b)=>a.imp-b.imp);
  document.getElementById("lossSum").textContent=fmtA(losses.reduce((s,x)=>s+x.imp,0),1);

}

/* 클레임 SVG 콤보차트 */
function claimChart(){
  const W=420,H=180,pl=34,pr=34,pt=14,pb=26, iw=W-pl-pr, ih=H-pt-pb;
  const m=CLAIM.month, cnt=CLAIM.count, cost=CLAIM.cost;
  const maxC=Math.max(...cnt.filter(v=>v!=null),1), maxK=Math.max(...cost.filter(v=>v!=null),0.1);
  const bw=iw/m.length*0.5;
  let svg=`<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">`;
  // grid
  for(let g=0;g<=2;g++){const y=pt+ih*g/2;svg+=`<line x1="${pl}" y1="${y}" x2="${W-pr}" y2="${y}" stroke="#eef0f2"/>`;}
  // bars (건수)
  m.forEach((mm,i)=>{const cx=pl+iw*(i+0.5)/m.length;
    if(cnt[i]!=null){const bh=cnt[i]/maxC*ih;svg+=`<rect x="${cx-bw/2}" y="${pt+ih-bh}" width="${bw}" height="${bh}" rx="3" fill="#F78F1E"/>`;
      svg+=`<text x="${cx}" y="${pt+ih-bh-5}" font-size="10" fill="#9a5a07" text-anchor="middle">${cnt[i]}</text>`;}
    svg+=`<text x="${cx}" y="${H-8}" font-size="10" fill="#6B7280" text-anchor="middle">${mm}</text>`;});
  // line (비용)
  let pts=[],lbl="";
  m.forEach((mm,i)=>{if(cost[i]!=null){const cx=pl+iw*(i+0.5)/m.length;const cy=pt+ih-(cost[i]/maxK*ih);pts.push([cx,cy]);
    lbl+=`<circle cx="${cx}" cy="${cy}" r="3.5" fill="#D93025"/><text x="${cx}" y="${cy-8}" font-size="10" fill="#D93025" text-anchor="middle">${cost[i].toFixed(2)}</text>`;}});
  if(pts.length>1) svg+=`<polyline points="${pts.map(p=>p.join(",")).join(" ")}" fill="none" stroke="#D93025" stroke-width="2.2"/>`;
  svg+=lbl+`</svg>`;
  return svg;
}

let curDiv=null, curGroup=null;
function openDiv(id){ curDiv=id; curGroup=null; showView("div"); renderDiv(); renderSidebar('div'); window.scrollTo(0,0); }

function gauge(k){
  const s=signal(k), col=s==="ok"?"var(--ok)":(s==="warn"?"var(--warn)":"var(--danger)");
  if(k.st==="count"){ return `<div class="gline">목표 ${k.target}${k.unit} · 현재 <b style="color:${col}">${k.actual==null?'–':k.actual+k.unit}</b>${k.actual!=null&&k.actual>k.target?` · 초과 ${k.actual-k.target}${k.unit}`:''}</div>`; }
  if(k.target==null||k.actual==null) return `<div class="gline muted">목표/실적 입력 시 표시</div>`;
  const ratio=k.st==="higher"?(k.target?k.actual/k.target:0):(k.actual?k.target/k.actual:1);
  const max=1.3, fillPct=Math.max(0,Math.min(ratio,max))/max*100, tgtPct=(1/max)*100;
  const gap=k.st==="higher"?(k.target-k.actual):(k.actual-k.target);
  const gapTxt=gap>0?`부족분 ${fmtDisp(k,Math.abs(gap))}`:"목표 도달";
  return `<div class="gauge"><div class="bar"><div class="fill" style="width:${fillPct}%;background:${col}"></div><div class="tgt" style="left:${tgtPct}%"></div></div>
    <div class="lb"><span>현재 <b>${fmtDisp(k,k.actual)}</b> · 달성률 ${(ratio*100).toFixed(0)}%</span><span>${gapTxt}</span></div></div>`;
}

    <div class="sec" style="margin-top:0"><span class="bar"></span><h2>FTE 배분 공헌이익</h2>
      <span class="s">배분단가 ${unit.toFixed(2)} 억/인 = ${L.totalCM.toFixed(0)}억 ÷ ${L.totalFTE}명 <span class="estbadge">공헌이익 임의</span></span></div>
    <table class="t2"><thead><tr><th>본부</th><th class="n">FTE</th><th class="n">배분 공헌이익</th><th class="n">실제 비용</th><th class="n">잉여/부족</th><th>해석</th></tr></thead><tbody>${rows}</tbody></table>
    <div class="sec"><span class="bar"></span><h2>채용 타당성 게이트</h2><span class="s">— 이 수치 없이 채용 승인 금지 <span class="realbadge">기준 실제</span></span></div>
    <div class="gatec">
      <div class="bx"><div class="l">신규 채용 인건비 (억)</div><div class="v"><input id="gc" type="number" step="0.05" value="${g.newLaborCost}"></div></div>
      <div class="bx"><div class="l">공헌이익률 기준 필요매출 (억)<br><span class="tiny">인건비 ÷ ${(g.cmRate*100).toFixed(0)}%</span></div><div class="v" id="gcm">${(g.newLaborCost/g.cmRate).toFixed(2)}</div></div>
      <div class="bx"><div class="l">영업이익률 기준 필요매출 (억)<br><span class="tiny">인건비 ÷ ${(g.opMarginRate*100).toFixed(1)}%</span></div><div class="v neg" id="gop">${(g.newLaborCost/g.opMarginRate).toFixed(1)}</div></div>
    </div>`;
  document.getElementById("back2").onclick=goHome;
  document.getElementById("gc").oninput=e=>{g.newLaborCost=parseFloat(e.target.value)||0;
    document.getElementById("gcm").textContent=(g.newLaborCost/g.cmRate).toFixed(2);
    document.getElementById("gop").textContent=(g.newLaborCost/g.opMarginRate).toFixed(1);};
}

/* =====================================================================
   ROUTING
===================================================================== */
function showView(v){
  document.getElementById("view-corp").classList.toggle("hidden",v!=="corp");
  document.getElementById("view-div").classList.toggle("hidden",v!=="div");
  document.getElementById("view-l2").classList.toggle("hidden",v!=="l2");
  if(v==="corp") renderCorp();
  renderSidebar(v);
}
function goHome(){ showView("corp"); window.scrollTo(0,0); }

(function init(){
  document.getElementById("bm").textContent=META.baseMonth+"월";
  document.getElementById("upd").textContent=META.lastUpdated;
  document.getElementById("logoHome").onclick=goHome;
  document.getElementById("titleHome").onclick=goHome;
  goHome();
})();
</script>
</body>
</html>
